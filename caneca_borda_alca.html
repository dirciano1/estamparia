<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Master Link - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        .ui-overlay {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 15px 25px;
            border-radius: 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 1000;
            border: 1px solid #e2e8f0;
        }
        .control-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .options { display: flex; gap: 12px; justify-content: center; }
        .btn-color {
            width: 35px; height: 35px; border-radius: 50%; border: 3px solid white;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }
        .btn-color.active { border-color: #2563eb; box-shadow: 0 0 0 2px #2563eb; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <span class="control-label">Cor da Alça e Fundo</span>
        <div class="options" id="menu-cores-unico"></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        const CORES = [
            { nome: 'Branco', hex: '#ffffff' },
            { nome: 'Vermelho', hex: '#DF1212' },
            { nome: 'Azul', hex: '#1D85D0' },
            { nome: 'Rosa Claro', hex: '#FFC2C2' },
            { nome: 'Verde', hex: '#075103' },
            { nome: 'Amarelo', hex: '#EDD900' },
            { nome: 'Laranja', hex: '#F86900' }
        ];

        const PECAS_COLORIDAS = ["Cylinder001_5", "Cylinder001_3"];
        const MESH_CORPO = "Cylinder001_2"; 

        let scene, camera, renderer, controls, model3D;
        let currentEstampa = null;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0.5, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0; 
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            // --- LÓGICA DE PARSE DO LINK MASTER ---
            // Formato: #foto.jpg|#hexcolor
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const nomeFoto = partes[0] || "";
            const corHexLink = partes[1] || "#ffffff";

            const texLoader = new THREE.TextureLoader();
            if (nomeFoto && nomeFoto.trim() !== "") {
                currentEstampa = texLoader.load('canecas/' + nomeFoto);
                currentEstampa.flipY = false;
                currentEstampa.encoding = THREE.sRGBEncoding;
            }

            const loader = new THREE.GLTFLoader();
            loader.load('caneca.gltf', (gltf) => {
                model3D = gltf.scene;
                
                // Cor vinda do link convertida para Linear
                const corInicial = new THREE.Color(corHexLink);
                corInicial.convertSRGBToLinear();

                model3D.traverse((node) => {
                    if (node.isMesh) {
                        const mat = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.05,
                            clearcoat: 1.0,
                            side: THREE.DoubleSide
                        });

                        // Aplica cor do link se for peça colorida
                        if (PECAS_COLORIDAS.includes(node.name)) {
                            mat.color.copy(corInicial);
                        }

                        // Aplica estampa se for o corpo
                        if (node.name === MESH_CORPO && currentEstampa) {
                            mat.map = currentEstampa;
                        }
                        node.material = mat;
                    }
                });

                const box = new THREE.Box3().setFromObject(model3D);
                model3D.position.sub(box.getCenter(new THREE.Vector3()));
                model3D.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                scene.add(model3D);
                
                gerarMenuUnico(corHexLink);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('hashchange', () => window.location.reload());
        }

        function gerarMenuUnico(corAtivaHex) {
            const container = document.getElementById('menu-cores-unico');
            CORES.forEach((cor) => {
                const btn = document.createElement('div');
                btn.className = 'btn-color';
                // Marca como ativo se o Hex bater com o do link
                if(cor.hex.toLowerCase() === corAtivaHex.toLowerCase()) btn.classList.add('active');
                
                btn.style.backgroundColor = cor.hex;
                
                btn.onclick = () => {
                    document.querySelectorAll('.btn-color').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const colorObj = new THREE.Color(cor.hex);
                    colorObj.convertSRGBToLinear();
                    
                    PECAS_COLORIDAS.forEach(meshId => {
                        model3D.traverse(node => {
                            if (node.isMesh && node.name === meshId) {
                                node.material.color.copy(colorObj);
                                node.material.needsUpdate = true;
                            }
                        });
                    });
                };
                container.appendChild(btn);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
