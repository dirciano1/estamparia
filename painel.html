<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gerador 3D | Estamparia Gerais</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); }
        
        .main-layout { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; min-height: 95vh; align-items: stretch; }

        /* LADO ESQUERDO: FORMULÁRIO */
        .sidebar { background: var(--card); width: 380px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        h2 { margin: 0 0 20px 0; font-size: 18px; text-align: center; color: var(--primary); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        
        select, input {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 14px; box-sizing: border-box; outline: none; font-family: inherit;
        }
        select:focus, input:focus { border-color: var(--primary); }

        .result-area { margin-top: 20px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        #linkGerado { font-size: 11px; background: #f8fafc; padding: 12px; border-radius: 8px; word-break: break-all; border: 1px solid #e2e8f0; display: block; margin-bottom: 10px; color: #475569; font-family: monospace; }
        
        .btn-copiar {
            width: 100%; background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        .btn-copiar:hover { background: #1d4ed8; }

        /* LADO DIREITO: PREVIEW 3D */
        .preview-container { flex: 1; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; border: 4px solid white; min-height: 500px; }
        .preview-header { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9); padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: 700; z-index: 10; border: 1px solid #eee; text-transform: uppercase; color: var(--primary); pointer-events: none; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* AJUSTES PARA MOBILE (CELULAR) */
        @media (max-width: 900px) {
            body { padding: 5px; }
            .main-layout { flex-direction: column; gap: 10px; }
            .sidebar { width: 100%; box-sizing: border-box; padding: 20px; border-radius: 15px; }
            
            /* FORÇA O IFRAME A SER GRANDE NO CELULAR */
            .preview-container { 
                height: 80vh; /* 80% da altura da tela */
                min-height: 80vh; 
                flex: none; 
                border-radius: 15px;
            }
            
            h2 { font-size: 16px; margin-bottom: 15px; }
            .btn-copiar { padding: 18px; font-size: 16px; } /* Botão maior para o polegar */
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="sidebar">
        <h2>🚀 Gerador Estamparia Gerais</h2>

        <div class="form-group">
            <label>Domínio Base</label>
            <input type="text" id="baseDomain" value="https://dirciano1.github.io/estamparia/" oninput="atualizarLink()">
        </div>

        <div class="form-group">
            <label>Tipo de Produto (Página)</label>
            <select id="modeloHtml" onchange="atualizarLink()">
                <option value="caneca_branca.html">Caneca Branca</option>
                <option value="caneca_pro.html">Caneca Pro (Alça + Fundo)</option>
                <option value="caneca_master.html">Caneca Master (Completa)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Cor Disponível</label>
            <select id="corHex" onchange="atualizarLink()">
                <option value="#ffffff">⚪ Branco (Porcelana)</option>
                <option value="#DF1212">🔴 Vermelho</option>
                <option value="#1D85D0">🔵 Azul</option>
                <option value="#FFC2C2">🌸 Rosa Claro</option>
                <option value="#075103">🟢 Verde</option>
                <option value="#EDD900">🟡 Amarelo</option>
                <option value="#F86900">🟠 Laranja</option>
            </select>
        </div>

        <div class="form-group">
            <label>Código da Arte</label>
            <input type="text" id="imgCode" placeholder="Ex: 01, joao" oninput="atualizarLink()">
        </div>

        <div class="result-area">
            <code id="linkGerado">Aguardando...</code>
            <button class="btn-copiar" onclick="copiarLink()">Copiar Link para o Cliente</button>
        </div>
    </div>

    <div class="preview-container">
        <div class="preview-header">👀 Prévia em Tempo Real</div>
        <iframe id="previewIframe" src=""></iframe>
    </div>
</div>

<script>
    function atualizarLink() {
        const domain = document.getElementById('baseDomain').value;
        const modelo = document.getElementById('modeloHtml').value;
        const cor = document.getElementById('corHex').value;
        let img = document.getElementById('imgCode').value.trim();

        const imgPart = img !== "" ? `${img}.jpg` : "";
        const linkFinal = `${domain}${modelo}#${imgPart}|${cor}`;

        document.getElementById('linkGerado').innerText = linkFinal;
        document.getElementById('previewIframe').src = linkFinal;
    }

    function copiarLink() {
        const link = document.getElementById('linkGerado').innerText;
        navigator.clipboard.writeText(link).then(() => {
            const btn = document.querySelector('.btn-copiar');
            const originalText = btn.innerText;
            btn.innerText = "✅ LINK COPIADO!";
            btn.style.background = "#10b981";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#2563eb";
            }, 2000);
        });
    }

    window.onload = atualizarLink;
</script>

</body>
</html>
