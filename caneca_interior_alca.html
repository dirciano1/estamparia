<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Master - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }

        .ui-overlay {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 15px 25px;
            border-radius: 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 1000;
            border: 1px solid #e2e8f0;
        }

        .control-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .options { display: flex; gap: 12px; justify-content: center; }
        
        .btn-color {
            width: 35px; height: 35px; border-radius: 50%; border: 3px solid white;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }
        .btn-color:hover { transform: scale(1.1); }
        .btn-color.active { border-color: #2563eb; box-shadow: 0 0 0 2px #2563eb; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <span class="control-label">Escolha a cor dos detalhes</span>
        <div class="options" id="menu-cores-unico"></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        const CORES = [
            { nome: 'Branco', hex: '#ffffff' },
            { nome: 'Vermelho', hex: '#DF1212' },
            { nome: 'Azul', hex: '#1D85D0' },
            { nome: 'Rosa Claro', hex: '#FFC2C2' },
            { nome: 'Verde', hex: '#075103' },
            { nome: 'Amarelo', hex: '#EDD900' },
            { nome: 'Laranja', hex: '#F86900' }
        ];

        // Mapeamento das peças que devem mudar de cor juntas
        const PECAS_COLORIDAS = [
            "Cylinder001_5", // Alça
            "Cylinder001_3", // Fundo
            "Cylinder001_4", // Interior
            "Cylinder001_1"  // Borda
        ];
        const MESH_CORPO = "Cylinder001_2"; // Estampa fixa

        let scene, camera, renderer, controls, currentEstampa;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0.5, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            const texLoader = new THREE.TextureLoader();
            const urlParams = new URLSearchParams(window.location.search);
            currentEstampa = texLoader.load(urlParams.get('foto') || 'canecas/01.jpg');
            currentEstampa.flipY = false;
            currentEstampa.encoding = THREE.sRGBEncoding;

            const loader = new THREE.GLTFLoader();
            loader.load('caneca.gltf', (gltf) => {
                const model = gltf.scene;

                model.traverse((node) => {
                    if (node.isMesh) {
                        const mat = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.05,
                            clearcoat: 1.0,
                            side: THREE.DoubleSide
                        });

                        if (node.name === MESH_CORPO) mat.map = currentEstampa;
                        node.material = mat;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                model.position.sub(box.getCenter(new THREE.Vector3()));
                model.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                scene.add(model);
                
                gerarMenuUnico();
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            window.addEventListener('resize', onWindowResize);
        }

        function gerarMenuUnico() {
            const container = document.getElementById('menu-cores-unico');
            CORES.forEach((cor, index) => {
                const btn = document.createElement('div');
                btn.className = 'btn-color' + (index === 0 ? ' active' : '');
                btn.style.backgroundColor = cor.hex;
                
                btn.onclick = () => {
                    // Interface
                    document.querySelectorAll('.btn-color').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Aplica a cor em todas as peças da lista ao mesmo tempo
                    PECAS_COLORIDAS.forEach(meshId => {
                        scene.traverse(node => {
                            if (node.isMesh && node.name === meshId) {
                                node.material.color.set(cor.hex);
                                node.material.needsUpdate = true;
                            }
                        });
                    });
                };
                container.appendChild(btn);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
