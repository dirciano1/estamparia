<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | Visualizador 3D Realista</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--light); color: var(--dark); overflow-x: hidden; }

        header {
            background: var(--white); display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .brand { font-weight: 700; color: var(--primary); font-size: 1.2rem; }

        .hero {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('banner.png') center/cover;
            display: flex; align-items: center; justify-content: center; text-align: center; color: white; margin-top: 60px;
        }

        .catalog { padding: 4rem 5%; max-width: 1200px; margin: 0 auto; }
        .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: white; border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid #eee; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card-info { padding: 1.5rem; }

        /* MODAL 3D */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 1100px; border-radius: 20px; display: flex; height: 85vh; position: relative; overflow: hidden; }
        .close-modal { position: absolute; right: 20px; top: 10px; font-size: 40px; cursor: pointer; z-index: 100; color: #64748b; }
        
        .modal-left { flex: 1.5; background: #ffffff; position: relative; border-right: 1px solid #eee; }
        #container3d { width: 100%; height: 100%; cursor: grab; }

        .modal-right { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .price { font-size: 2.5rem; font-weight: 800; color: #16a34a; margin: 20px 0; }
        .btn-whats { background: #25d366; color: white; padding: 18px; text-align: center; text-decoration: none; border-radius: 50px; font-weight: 700; transition: 0.2s; }
        .btn-whats:hover { transform: scale(1.03); background: #1fb355; }

        @media (max-width: 850px) {
            .modal-content { flex-direction: column; overflow-y: auto; }
            .modal-left { height: 400px; flex: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">Estamparia Gerais</div>
        <nav><a href="#produtos" style="text-decoration: none; color: var(--dark); font-weight: 600;">Catálogo</a></nav>
    </header>

    <section class="hero">
        <h1>Simulador 3D Profissional</h1>
    </section>

    <section class="catalog" id="produtos">
        <div class="grid-products">
            <div class="card" onclick="openModal3D('canecas/01.jpg', 'Caneca Branca Premium', '35,00')">
                <img src="canecas/01.jpg" alt="Caneca">
                <div class="card-info"><h3>Caneca Personalizada</h3><p>R$ 35,00</p></div>
            </div>
        </div>
    </section>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-left">
                <div id="container3d"></div>
            </div>
            <div class="modal-right">
                <h2 id="modalTitle">Título</h2>
                <p style="color: #64748b; margin-top: 10px;">Visualização em tempo real com acabamento em porcelana. Alça e interior preservados em branco.</p>
                <div class="price">R$ <span id="modalPrice">0,00</span></div>
                <a href="#" id="waLink" class="btn-whats" target="_blank">Encomendar via WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader;

        function init3D(textureUrl) {
            const container = document.getElementById('container3d');
            container.innerHTML = ''; 

            // 1. Cena e Câmera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 4); 

            // 2. Renderizador de Alta Qualidade
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // 3. Iluminação de Estúdio
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(5, 10, 7);
            scene.add(mainLight);

            const fillLight = new THREE.PointLight(0xffffff, 0.5);
            fillLight.position.set(-5, 5, -5);
            scene.add(fillLight);

            // 4. Carregamento
            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();

            // Resolve caminho do GitHub automaticamente
            const baseUrl = window.location.href.split('#')[0].split('?')[0].replace('index.html', '');
            const finalTexturePath = textureUrl.startsWith('http') ? textureUrl : baseUrl + textureUrl;

            loaderGLTF.load('objetos/scene.gltf', (gltf) => {
                const model = gltf.scene;

                // Carrega a Estampa
                const estampa = texLoader.load(finalTexturePath);
                estampa.flipY = false; 
                estampa.encoding = THREE.sRGBEncoding;
                estampa.wrapS = THREE.ClampToEdgeWrapping;
                estampa.wrapT = THREE.ClampToEdgeWrapping;

                model.traverse((node) => {
                    if (node.isMesh) {
                        // MATERIAL DE PORCELANA REALISTA
                        node.material = new THREE.MeshPhysicalMaterial({
                            map: estampa,
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.05,
                            reflectivity: 0.8,
                            clearcoat: 1.0,
                            clearcoatRoughness: 0.1,
                            side: THREE.DoubleSide
                        });

                        // LÓGICA DE PROTEÇÃO (Alça e Fundo Brancos)
                        if (node.geometry.attributes.uv) {
                            const uvs = node.geometry.attributes.uv.array;
                            for (let i = 0; i < uvs.length; i += 2) {
                                // Se a coordenada UV estiver nas bordas (alça, topo, base), move para área branca
                                if (uvs[i] > 0.94 || uvs[i] < 0.06 || uvs[i+1] < 0.1 || uvs[i+1] > 0.9) {
                                    uvs[i] = 0; uvs[i+1] = 0; 
                                }
                            }
                            node.geometry.attributes.uv.needsUpdate = true;
                        }
                        node.material.needsUpdate = true;
                    }
                });

                // Centralização e Escala
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                model.scale.setScalar(3.0 / size);
                
                scene.add(model);
            }, undefined, (err) => {
                console.error("Erro ao carregar o 3D:", err);
            });

            // 5. Controles
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        function openModal3D(img, titulo, preco) {
            document.getElementById('productModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('modalPrice').innerText = preco;
            
            const msg = `Olá! Gostaria de encomendar a caneca: ${titulo}`;
            document.getElementById('waLink').href = `https://wa.me/5500000000000?text=${encodeURI(msg)}`;

            setTimeout(() => { init3D(img); }, 200);
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
    </script>
</body>
</html>
