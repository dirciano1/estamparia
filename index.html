<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | Premium 3D</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --success: #16a34a;
            --dark: #111111; 
            --bg: #f5f5f7; 
            --white: #ffffff;
            --search-bg: #e2e8f0; 
            --header-desktop: 85px;
            --header-mobile: 75px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #64748b; overflow-x: hidden; }
        
        a { text-decoration: none; color: inherit; }

        /* HEADER */
        header { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(20px);
            padding: 0 4vw; 
            display: flex; justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            height: var(--header-desktop);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .brand-container { display: flex; align-items: center; }

        .brand { 
            display: flex; align-items: center; 
            background: var(--search-bg); 
            height: 48px; 
            padding: 0 20px 0 0; 
            border-radius: 15px;
            position: relative;
            white-space: nowrap;
        }

        .brand img { 
            width: 92px; height: auto;
            position: absolute;
            left: -15px; top: 50%;
            transform: translateY(-50%);
            filter: drop-shadow(0px 8px 15px rgba(0,0,0,0.2));
            z-index: 2;
        }

        .brand h1 {
            font-size: 1.1rem; 
            font-weight: 800;
            margin-left: 65px; 
            letter-spacing: -0.5px;
        }

        .brand h1 span {
            background: linear-gradient(90deg, #ff007a, #ff9500, #34c759, #007aff, #ff007a);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorsPassing 4s linear infinite;
        }

        @keyframes colorsPassing {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .search-container { width: 220px; transition: all 0.4s ease; margin-left: 15px; }
        .search-container input {
            width: 100%; height: 45px; padding: 0 15px; border-radius: 12px;
            border: 1px solid #cbd5e1; background: var(--search-bg); outline: none;
            font-size: 0.9rem;
        }

        /* HERO */
        .hero { 
            width: 100%; height: 100vh; height: 100svh;
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%), url('imagens/banner.png'); 
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .hero-content h2 { font-size: clamp(2.2rem, 9vw, 4rem); font-weight: 800; text-shadow: 0 4px 25px rgba(0,0,0,0.6); }
        .hero-btn { 
            background: var(--primary); color: white; padding: 1.2rem 3rem; 
            font-weight: 700; border-radius: 50px; display: inline-block; 
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4); margin-top: 20px;
        }

        /* FILTROS E POSICIONAMENTO */
        #catalogo { 
            scroll-margin-top: var(--header-desktop); 
        }
        
        .filter-wrapper {
            position: sticky; 
            top: var(--header-desktop); 
            z-index: 100;
            background: var(--bg); 
            padding: 15px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .filter-section { 
            display: flex; gap: 12px; overflow-x: auto; padding: 0 5%;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }

        .filter-section::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }

        .chip { 
            flex: 0 0 auto; padding: 10px 22px; border-radius: 50px; 
            background: var(--white); border: 1px solid #e2e8f0; 
            cursor: pointer; font-size: 13px; font-weight: 700; 
            text-transform: uppercase; color: var(--dark); 
        }
        .chip.active { background: var(--dark); color: var(--white); border-color: var(--dark); }

        /* GRID */
        .container { width: 95%; max-width: 1300px; margin: 0 auto; padding: 25px 0 60px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

        .p-card { background: var(--white); border-radius: 22px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.04); display: flex; flex-direction: column; }
        .p-img img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .p-info { padding: 15px; text-align: center; }
        .p-title { font-size: 0.95rem; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
        .p-price { font-size: 1.1rem; font-weight: 800; color: var(--success); display: block; margin-bottom: 12px; }
        .btn-more { margin: 0 15px 15px; padding: 12px; background: var(--primary); color: white; font-weight: 700; border-radius: 12px; text-align: center; font-size: 0.75rem; }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            header { height: var(--header-mobile); padding: 0 4vw; }
            #catalogo { scroll-margin-top: var(--header-mobile); }
            .filter-wrapper { top: var(--header-mobile); padding: 30px 0 !important; }

            .hero { background-image: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%), url('imagens/banner_mobile.png'); }

            .brand { height: 42px; padding-right: 15px; }
            .brand img { width: 78px; left: -12px; }
            .brand h1 { font-size: 0.9rem; margin-left: 54px; }

            .search-container { width: 120px !important; margin-left: 8px; }
            .search-container input { height: 42px; font-size: 0.8rem; }
            
            .search-container:focus-within {
                position: absolute; right: 4vw; width: 92vw !important; z-index: 10;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <a href="#" class="brand">
                <img src="imagens/logo.png" alt="Logo Estamparia Gerais">
                <h1><span>Estamparia Gerais</span></h1>
            </a>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="filterSearch()">
        </div>
    </header>

    <section class="hero">
        <div class="hero-content" data-aos="zoom-out">
            <h2>Sua Ideia,<br>Nosso Design.</h2>
            <p>Produtos premium personalizados em 3D.</p>
            <a href="#catalogo" class="hero-btn">Explorar Agora</a>
        </div>
    </section>

    <div id="catalogo">
        <div class="filter-wrapper">
            <div class="filter-section">
                <button class="chip active" onclick="filterCategory('todos', this)">Todos</button>
                <button class="chip" onclick="filterCategory('caneca', this)">Canecas</button>
                <button class="chip" onclick="filterCategory('camisa', this)">Camisas</button>
                <button class="chip" onclick="filterCategory('chaveiro', this)">Chaveiros</button>
                <button class="chip" onclick="filterCategory('quadro', this)">Quadros</button>
                <button class="chip" onclick="filterCategory('brinde', this)">Brindes</button>
            </div>
        </div>

        <div class="container">
            <main class="product-grid" id="productGrid">
                <a href="paginas/caneca_pro.html" class="p-card" data-category="caneca" data-name="caneca alça borda colorida">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Caneca Alça & Borda</h3>
                        <span class="p-price">R$ 45,00</span>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

                <a href="#" class="p-card" data-category="caneca" data-name="caneca branca clássica">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Caneca Branca</h3>
                        <span class="p-price">R$ 35,00</span>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

                <a href="#" class="p-card" data-category="camisa" data-name="camiseta personalizada">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Camiseta Algodão</h3>
                        <span class="p-price">R$ 59,90</span>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

                <a href="#" class="p-card" data-category="chaveiro" data-name="chaveiro personalizado">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Chaveiro Metal</h3>
                        <span class="p-price">R$ 15,00</span>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>
            </main>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        function filterCategory(category, element) {
            const cards = document.querySelectorAll('.p-card');
            const chips = document.querySelectorAll('.chip');
            chips.forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            
            cards.forEach(card => {
                const cardCategory = card.getAttribute('data-category');
                card.style.display = (category === 'todos' || cardCategory === category) ? 'flex' : 'none';
            });

            // CORREÇÃO: Força o catálogo a ficar no topo sem mostrar o banner
            const catalogoSection = document.getElementById('catalogo');
            catalogoSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

            AOS.refresh();
        }

        function filterSearch() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.p-card');
            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                card.style.display = name.includes(input) ? 'flex' : 'none';
            });
            AOS.refresh();
        }
    </script>
</body>
</html>
