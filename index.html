<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | Personalizados 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }

        header {
            background: var(--white); display: flex; justify-content: space-between; align-items: center;
            padding: 0.8rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 45px; border-radius: 5px; }
        .brand-name { font-weight: 700; font-size: 1.3rem; color: var(--primary); text-decoration: none; }
        
        .hero {
            height: 70vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('banner.png') center/cover;
            display: flex; align-items: center; justify-content: center; text-align: center; color: white;
        }

        .catalog { padding: 5rem 5%; max-width: 1300px; margin: 0 auto; }
        .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2.5rem; }
        .card { background: white; border-radius: 20px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #eee; text-align: center; }
        .card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }
        .card img { width: 100%; height: 300px; object-fit: cover; }

        /* MODAL 3D */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 1100px; border-radius: 25px; display: flex; height: 85vh; position: relative; overflow: hidden; }
        .close-modal { position: absolute; right: 25px; top: 15px; font-size: 40px; cursor: pointer; z-index: 10; color: #64748b; }
        
        .modal-left { flex: 1.4; background: #ffffff; border-right: 1px solid #eee; position: relative; }
        #container3d { width: 100%; height: 100%; cursor: grab; }

        .modal-right { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .price-modal { font-size: 2.5rem; font-weight: 800; color: #16a34a; margin: 20px 0; }
        .btn-whats { background: #25d366; color: white; padding: 18px; text-align: center; text-decoration: none; border-radius: 50px; font-weight: 700; transition: 0.3s; }
        .btn-whats:hover { transform: scale(1.05); }

        @media (max-width: 850px) { .modal-content { flex-direction: column; overflow-y: auto; } .modal-left { height: 400px; flex: none; } }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="logo-img">
            <a href="#" class="brand-name">Estamparia Gerais</a>
        </div>
        <nav><a href="#produtos" style="text-decoration: none; color: var(--dark); font-weight: 600;">Produtos</a></nav>
    </header>

    <section class="hero">
        <div>
            <h1>Visualize sua ideia em 3D</h1>
            <p>Sua caneca personalizada com realismo total.</p>
        </div>
    </section>

    <section class="catalog" id="produtos">
        <div class="grid-products">
            <div class="card" onclick="openModal3D('canecas/01.jpg', 'Caneca de Cerâmica', '35,00')">
                <img src="canecas/01.jpg" alt="Caneca">
                <div class="card-info"><h3>Caneca Premium</h3><p>R$ 35,00</p></div>
            </div>
        </div>
    </section>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-left">
                <div id="container3d"></div>
            </div>
            <div class="modal-right">
                <h2 id="modalTitle">Título do Produto</h2>
                <p>Use o mouse para girar. A estampa envolve apenas o corpo da caneca, simulando sublimação real.</p>
                <div class="price-modal">R$ <span id="modalPrice">0,00</span></div>
                <a href="#" id="waLink" class="btn-whats" target="_blank">Pedir pelo WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader;

        function init3D(textureUrl) {
            const container = document.getElementById('container3d');
            container.innerHTML = ''; 

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 4); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // ILUMINAÇÃO REFORÇADA
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 5, 5);
            scene.add(light);
            
            const lightBack = new THREE.DirectionalLight(0xffffff, 0.8);
            lightBack.position.set(-5, 2, -5);
            scene.add(lightBack);

            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();

            // Ajuste de caminho para GitHub
            loaderGLTF.setPath('objetos/'); 
            loaderGLTF.load('scene.gltf', (gltf) => {
                const model = gltf.scene;

                // Carregar estampa
                const estampa = texLoader.load('../' + textureUrl); 
                estampa.flipY = false; 
                estampa.encoding = THREE.sRGBEncoding;
                estampa.wrapS = THREE.ClampToEdgeWrapping; // Evita repetir na alça
                estampa.wrapT = THREE.ClampToEdgeWrapping;

                model.traverse((node) => {
                    if (node.isMesh) {
                        // Forçar material Branco Cerâmica Blindado
                        node.material = new THREE.MeshPhongMaterial({
                            map: estampa,
                            color: 0xffffff,
                            shininess: 100,
                            side: THREE.DoubleSide
                        });
                        
                        // Lógica UV: Tenta manter alça e fundo brancos se a malha permitir
                        if (node.geometry.attributes.uv) {
                            const uvs = node.geometry.attributes.uv.array;
                            for (let i = 0; i < uvs.length; i += 2) {
                                // Se a coordenada UV for de borda (alça/topo/fundo), limpa a textura
                                if (uvs[i] > 0.95 || uvs[i] < 0.05 || uvs[i+1] < 0.1 || uvs[i+1] > 0.9) {
                                    uvs[i] = 0; uvs[i+1] = 0; 
                                }
                            }
                            node.geometry.attributes.uv.needsUpdate = true;
                        }
                        node.material.needsUpdate = true;
                    }
                });

                // Centralizar e Escalar
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                const scale = 3.0 / size;
                model.scale.set(scale, scale, scale);
                
                scene.add(model);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            function animate() {
                requestAnimationFrame(animate);
                if(controls) controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        function openModal3D(img, titulo, preco) {
            document.getElementById('productModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('modalPrice').innerText = preco;
            setTimeout(() => { init3D(img); }, 200);
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
    </script>
</body>
</html>
