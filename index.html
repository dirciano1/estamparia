<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D Profissional | Estamparia Gerais</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; background: #ffffff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        #canvas-container { width: 100%; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader;

        function init() {
            const container = document.getElementById('canvas-container');

            // Cena e Câmera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 4);

            // Renderizador (ALTA QUALIDADE)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // Iluminação
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();

            // 1. CARREGAR A ESTAMPA
            const estampaUrl = 'canecas/01.jpg'; // Verifique se o caminho está exato
            const estampa = texLoader.load(estampaUrl, () => {
                console.log("-> Imagem da estampa carregada com sucesso.");
            });
            estampa.flipY = false; 
            estampa.encoding = THREE.sRGBEncoding;

            // 2. CARREGAR O MODELO (caneca.gltf)
            loaderGLTF.load('caneca.gltf', (gltf) => {
                const model = gltf.scene;

                // Percorrer as peças do modelo
                model.traverse((node) => {
                    if (node.isMesh) {
                        // Criamos o material base (Branco Porcelana Brilhante)
                        const matPorcelana = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.05,
                            clearcoat: 1.0,          // Verniz de porcelana
                            clearcoatRoughness: 0.02,
                            side: THREE.DoubleSide
                        });

                        // LÓGICA DE ISOLAMENTO (Baseado no teu Log do Console)
                        // Em modelos de caneca Mug3D, a peça com _1 (ou index 0)
                        // é quase sempre o corpo cilíndrico externo (a área de impressão).

                        // Se pegava na alça, vamos restringir apenas à peça principal.
                        if (node.name.includes("Cylinder001_1")) {
                            matPorcelana.map = estampa;
                            console.log("-> Estampa aplicada apenas no corpo cilíndrico (" + node.name + ")");
                        } else {
                            // Alça, Interior e Fundo ficam sem o mapa (brancos)
                            matPorcelana.map = null;
                            console.log("-> Peça " + node.name + " mantida branca (alça/interior).");
                        }

                        node.material = matPorcelana;
                    }
                });

                // Centralização e Escala Automática
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3()).length();
                model.position.sub(center);
                model.scale.setScalar(3.0 / size);
                
                scene.add(model);
            });

            // Controles de Mouse
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.minDistance = 2.5; // Limita zoom para não entrar no objeto
            controls.maxDistance = 6.0;

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
