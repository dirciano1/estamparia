<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | Visualizador 3D Realista</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; background: #ffffff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        #canvas-container { width: 100%; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader;

        function init() {
            const container = document.getElementById('canvas-container');

            // Cena e Câmera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 4);

            // Renderizador (ALTA QUALIDADE)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // Iluminação
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();

            // 1. CARREGAR A ESTAMPA
            const estampaUrl = 'canecas/01.jpg'; // Verifique se o caminho está exato
            const estampa = texLoader.load(estampaUrl);
            estampa.flipY = false; 
            estampa.encoding = THREE.sRGBEncoding;
            estampa.wrapS = THREE.ClampToEdgeWrapping;
            estampa.wrapT = THREE.ClampToEdgeWrapping;

            // 2. CARREGAR O MODELO (caneca.gltf)
            loaderGLTF.load('caneca.gltf', (gltf) => {
                const model = gltf.scene;

                // Percorrer as peças do modelo
                model.traverse((node) => {
                    if (node.isMesh) {
                        // Criamos o material base (Branco Porcelana Brilhante)
                        // A estampa NÃO é aplicada aqui inicialmente.
                        const matPorcelana = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.05,
                            clearcoat: 1.0,          // Verniz de porcelana
                            clearcoatRoughness: 0.02,
                            side: THREE.DoubleSide
                        });

                        node.material = matPorcelana;

                        // LÓGICA DE CORTE UV (Mágica para isolar a estampa)
                        // Como o modelo é uma peça única, precisamos modificar as coordenadas UV
                        // da geometria para dizer onde a estampa pode e não pode aparecer.
                        
                        // Pegamos a geometria
                        const geometry = node.geometry;
                        if (geometry.attributes.uv) {
                            const uvs = geometry.attributes.uv.array;
                            for (let i = 0; i < uvs.length; i += 2) {
                                // uvs[i] é a coordenada X (horizontal, de 0 a 1 em volta da caneca)
                                // uvs[i+1] é a coordenada Y (vertical, de 0 a 1 do fundo ao topo)

                                // O Mug3D costuma colocar a alça e o interior nas bordas (0 ou 1)
                                // Vamos 'empurrar' essas áreas para um pixel branco na textura.

                                // Filtro Vertical (Remove estampa do fundo e do topo interno)
                                if (uvs[i+1] < 0.1 || uvs[i+1] > 0.9) {
                                    uvs[i] = 0; uvs[i+1] = 0; // Ponto branco na textura
                                }
                                
                                // Filtro Horizontal (Remove estampa da alça e interior)
                                // Se o valor horizontal estiver muito nas bordas, assume que é alça.
                                if (uvs[i] > 0.94 || uvs[i] < 0.06) {
                                    uvs[i] = 0; uvs[i+1] = 0; // Ponto branco na textura
                                }
                            }
                            geometry.attributes.uv.needsUpdate = true; // Força o Three.js a ler as novas UVs
                        }

                        // Agora que limpamos as UVs, aplicamos a estampa
                        node.material.map = estampa;
                        console.log("-> Estampa aplicada com isolamento UV.");
                    }
                });

                // Centralização e Escala Automática
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3()).length();
                model.position.sub(center);
                model.scale.setScalar(3.0 / size);
                
                scene.add(model);
            });

            // Controles de Mouse
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;
            controls.minDistance = 2.5; 
            controls.maxDistance = 6.0;

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
