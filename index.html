<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | Personalizados 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }

        /* --- HEADER --- */
        header {
            background: var(--white); display: flex; justify-content: space-between; align-items: center;
            padding: 0.8rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 45px; border-radius: 5px; }
        .brand-name { font-weight: 700; font-size: 1.3rem; color: var(--primary); text-decoration: none; }
        
        .search-container { flex: 1; max-width: 400px; margin: 0 30px; }
        .search-container input { 
            width: 100%; padding: 10px 20px; border-radius: 25px; border: 1px solid #ddd; 
            outline: none; background: #f1f5f9; transition: 0.3s;
        }
        .search-container input:focus { background: white; border-color: var(--primary); }

        /* --- HERO BANNER --- */
        .hero {
            height: 85vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('banner.png');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; text-align: center; color: white;
        }
        .hero-content h1 { font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 15px; font-weight: 700; }
        .btn-hero { 
            background: var(--primary); color: white; padding: 15px 45px; 
            border-radius: 50px; text-decoration: none; font-weight: 600; display: inline-block;
            transition: 0.3s; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        /* --- CATALOGO --- */
        .catalog { padding: 5rem 5%; max-width: 1300px; margin: 0 auto; }
        .filter-buttons { display: flex; justify-content: center; gap: 12px; margin-bottom: 3rem; flex-wrap: wrap; }
        .filter-btn { padding: 10px 25px; border: 2px solid var(--primary); border-radius: 30px; cursor: pointer; font-weight: 600; transition: 0.3s; background: none; color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: white; }

        .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2.5rem; }
        .card { background: white; border-radius: 20px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #eee; text-align: center; }
        .card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card-info { padding: 1.5rem; }

        /* --- MODAL 3D --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 1100px; border-radius: 25px; display: flex; height: 85vh; position: relative; overflow: hidden; }
        .close-modal { position: absolute; right: 25px; top: 15px; font-size: 40px; cursor: pointer; z-index: 10; color: #64748b; }
        
        .modal-left { flex: 1.4; background: #f8fafc; position: relative; border-right: 1px solid #eee; }
        #container3d { width: 100%; height: 100%; cursor: grab; }
        
        .modal-right { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .price-modal { font-size: 2.5rem; font-weight: 800; color: #16a34a; margin: 20px 0; }
        .btn-whats { background: #25d366; color: white; padding: 18px; text-align: center; text-decoration: none; border-radius: 50px; font-weight: 700; }

        @media (max-width: 850px) {
            .modal-content { flex-direction: column; overflow-y: auto; }
            .modal-left { height: 350px; flex: none; }
            .search-container { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="logo-img">
            <a href="#" class="brand-name">Estamparia Gerais</a>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="O que você procura?" onkeyup="searchProducts()">
        </div>
        <nav><a href="#produtos" style="text-decoration: none; color: var(--dark); font-weight: 600;">Catálogo</a></nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Sua ideia, nossa estampa.</h1>
            <p>Personalizados com visualização 3D exclusiva.</p>
            <a href="#produtos" class="btn-hero">Ver Produtos</a>
        </div>
    </section>

    <section class="catalog" id="produtos">
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="todos">Todos</button>
            <button class="filter-btn" data-filter="canecas">Canecas</button>
        </div>

        <div class="grid-products" id="productGrid">
            <div class="card" data-category="canecas" onclick="openModal3D('canecas/01.jpg', 'Caneca Premium', '35,00')">
                <img src="canecas/01.jpg" alt="Caneca">
                <div class="card-info"><h3>Caneca Personalizada</h3><p>R$ 35,00</p><span>Clique para ver em 3D</span></div>
            </div>
        </div>
    </section>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-left">
                <div id="container3d"></div>
            </div>
            <div class="modal-right">
                <h2 id="modalTitle">Título</h2>
                <p>Gire o modelo para ver sua estampa em todos os ângulos.</p>
                <div class="price-modal">R$ <span id="modalPrice">0,00</span></div>
                <a href="#" id="waLink" class="btn-whats" target="_blank">Pedir via WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader, cube;

        function init3D(textureUrl) {
            const container = document.getElementById('container3d');
            container.innerHTML = ''; 

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 5); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 5, 5);
            scene.add(light);

            // Cubo de teste (aparece se o GLTF falhar)
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshPhongMaterial({ color: 0x2563eb });
            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();

            // Carregando modelo da pasta objetos/
            loaderGLTF.load('objetos/scene.gltf', (gltf) => {
                const model = gltf.scene;
                
                // Centralização e Escala
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                const scale = 2.5 / size;
                model.scale.set(scale, scale, scale);

                // Aplica estampa
                const estampa = texLoader.load(textureUrl);
                estampa.flipY = false; 
                estampa.encoding = THREE.sRGBEncoding;

                model.traverse((node) => {
                    if (node.isMesh) {
                        node.material.map = estampa;
                        node.material.needsUpdate = true;
                    }
                });

                scene.remove(cube); // Remove teste
                scene.add(model);
            }, undefined, (err) => {
                console.error("Erro no GLTF:", err);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            function animate() {
                requestAnimationFrame(animate);
                if(cube) cube.rotation.y += 0.01;
                if(controls) controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        function openModal3D(img, titulo, preco) {
            document.getElementById('productModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('modalPrice').innerText = preco;
            setTimeout(() => { init3D(img); }, 200);
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
        
        function searchProducts() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(input) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
