<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | Visualizador 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --light: #f8fafc; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--light); color: var(--dark); }

        header {
            background: var(--white); display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .brand { font-weight: 700; color: var(--primary); font-size: 1.2rem; }

        .catalog { padding: 6rem 5% 2rem; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem; }
        .card { background: white; border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid #eee; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-info { padding: 1rem; }

        /* MODAL 3D */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 1000px; border-radius: 20px; display: flex; height: 80vh; position: relative; overflow: hidden; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 35px; cursor: pointer; z-index: 100; color: #64748b; }
        
        .modal-left { flex: 1.5; background: #ffffff; position: relative; }
        #container3d { width: 100%; height: 100%; cursor: grab; }

        .modal-right { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; border-left: 1px solid #eee; }
        .price { font-size: 2.2rem; font-weight: 800; color: #16a34a; margin: 15px 0; }
        .btn-whats { background: #25d366; color: white; padding: 15px; text-align: center; text-decoration: none; border-radius: 50px; font-weight: 700; }

        @media (max-width: 850px) {
            .modal-content { flex-direction: column; overflow-y: auto; }
            .modal-left { height: 350px; flex: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">Estamparia Gerais</div>
        <nav><a href="#" style="text-decoration: none; color: var(--dark);">Início</a></nav>
    </header>

    <section class="catalog">
        <div class="grid">
            <div class="card" onclick="openModal3D('canecas/01.jpg', 'Caneca de Porcelana', '35,00')">
                <img src="canecas/01.jpg" alt="Caneca">
                <div class="card-info"><h3>Caneca Premium</h3><p>R$ 35,00</p></div>
            </div>
        </div>
    </section>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-left"><div id="container3d"></div></div>
            <div class="modal-right">
                <h2 id="modalTitle">Título</h2>
                <p>Visualização 3D Realista. Arraste para girar.</p>
                <div class="price">R$ <span id="modalPrice">0,00</span></div>
                <a href="#" id="waLink" class="btn-whats" target="_blank">Pedir via WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader;

        function init3D(textureUrl) {
            const container = document.getElementById('container3d');
            container.innerHTML = ''; 

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 4); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            container.appendChild(renderer.domElement);

            // Luzes inspiradas no Rapid Mockup
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();

            // Caminho absoluto para evitar erros no GitHub
            const baseUrl = window.location.href.split('#')[0].split('?')[0].replace('index.html', '');
            const finalPath = textureUrl.startsWith('http') ? textureUrl : baseUrl + textureUrl;

            loaderGLTF.load('objetos/scene.gltf', (gltf) => {
                const model = gltf.scene;

                // Carrega a Estampa
                const estampa = texLoader.load(finalPath);
                estampa.flipY = false; 
                estampa.encoding = THREE.sRGBEncoding;
                estampa.wrapS = THREE.ClampToEdgeWrapping;
                estampa.wrapT = THREE.ClampToEdgeWrapping;

                model.traverse((node) => {
                    if (node.isMesh) {
                        // CONFIGURAÇÃO DE PORCELANA (FÍSICA)
                        node.material = new THREE.MeshPhysicalMaterial({
                            map: estampa,
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.1,
                            reflectivity: 0.8,
                            clearcoat: 1.0,
                            clearcoatRoughness: 0.1,
                            side: THREE.DoubleSide
                        });

                        // LÓGICA UV PARA LIMPAR ALÇA/INTERIOR
                        if (node.geometry.attributes.uv) {
                            const uvs = node.geometry.attributes.uv.array;
                            for (let i = 0; i < uvs.length; i += 2) {
                                // Se a coordenada UV estiver nas bordas (alça/base), aponta para um pixel branco
                                if (uvs[i] > 0.94 || uvs[i] < 0.06 || uvs[i+1] < 0.1 || uvs[i+1] > 0.9) {
                                    uvs[i] = 0; uvs[i+1] = 0; 
                                }
                            }
                            node.geometry.attributes.uv.needsUpdate = true;
                        }
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                const size = box.getSize(new THREE.Vector3()).length();
                model.scale.setScalar(3.0 / size);
                
                scene.add(model);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            function animate() {
                requestAnimationFrame(animate);
                if(controls) controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        function openModal3D(img, titulo, preco) {
            document.getElementById('productModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('modalPrice').innerText = preco;
            setTimeout(() => { init3D(img); }, 200);
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
    </script>
</body>
</html>
