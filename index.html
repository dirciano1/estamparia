<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | Personalização de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --dark: #0f172a; 
            --accent: #16a34a; 
            --bg: #f8fafc; 
            --text: #475569; 
            --white: #ffffff;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text); overflow-x: hidden; }

        /* HEADER */
        header { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 1px 0 rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-img { width: 40px; height: 40px; }
        .brand h1 { font-size: 20px; color: var(--dark); font-weight: 700; }

        /* BUSCA E FILTROS */
        .search-container { position: relative; width: 300px; }
        .search-container input { 
            width: 100%; padding: 10px 15px; border-radius: 30px; 
            border: 1px solid #e2e8f0; outline: none; transition: 0.3s;
            font-family: inherit; font-size: 14px;
        }
        .search-container input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        /* NOVO BANNER MODERNIZADO */
        .hero-banner { 
            margin: 20px 5%;
            height: 350px;
            background: linear-gradient(45deg, #0f172a 0%, #1e293b 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .hero-text { position: relative; z-index: 2; max-width: 500px; }
        .hero-text h2 { font-size: 40px; line-height: 1.1; margin-bottom: 15px; }
        .hero-text p { font-size: 16px; opacity: 0.8; margin-bottom: 25px; }
        .hero-visual { position: absolute; right: 0; top: 0; height: 100%; width: 50%; background: url('imagens/banner_decor.png') no-repeat center right; background-size: contain; opacity: 0.5; }

        /* FILTROS (PALAVRAS CHAVE) */
        .filter-section { padding: 20px 5%; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .filter-label { font-size: 14px; font-weight: 600; color: var(--dark); margin-right: 10px; }
        .filter-chip { 
            padding: 8px 20px; border-radius: 50px; background: white; 
            border: 1px solid #e2e8f0; cursor: pointer; transition: 0.3s;
            font-size: 14px; font-weight: 500; color: var(--text);
        }
        .filter-chip:hover, .filter-chip.active { 
            background: var(--primary); border-color: var(--primary); color: white; 
        }

        /* GRID DE PRODUTOS */
        .product-grid { 
            padding: 20px 5% 80px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 25px; 
        }
        .p-card { 
            background: white; border-radius: var(--radius); overflow: hidden; 
            transition: 0.3s; border: 1px solid #f1f5f9; text-decoration: none; color: inherit;
        }
        .p-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .p-img { width: 100%; height: 240px; display: flex; align-items: center; justify-content: center; background: #fff; padding: 20px; }
        .p-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .p-info { padding: 20px; border-top: 1px solid #f8fafc; }
        .p-category { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); font-weight: 700; margin-bottom: 5px; display: block; }
        .p-title { font-size: 16px; font-weight: 600; color: var(--dark); margin-bottom: 10px; }
        .p-price { font-size: 18px; font-weight: 700; color: var(--accent); }

        @media (max-width: 850px) {
            .hero-banner { height: auto; padding: 40px 30px; flex-direction: column; text-align: center; }
            .hero-visual { display: none; }
            header { flex-direction: column; gap: 15px; }
            .search-container { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="brand">
            <img src="imagens/logo.png" alt="Logo" class="logo-img"> 
            <h1>Estamparia Gerais</h1>
        </a>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar produto..." onkeyup="filterSearch()">
        </div>
    </header>

    <div class="hero-banner">
        <div class="hero-text">
            <h2>Crie seu estilo,<br>nós estampamos.</h2>
            <p>Personalização premium com visualização 3D realista para você não ter dúvidas na hora de comprar.</p>
            <a href="#catalogo" style="background: var(--white); color: var(--dark); padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 14px;">Explorar agora</a>
        </div>
        <div class="hero-visual"></div>
    </div>

    <div class="filter-section" id="catalogo">
        <span class="filter-label">Filtrar por:</span>
        <button class="filter-chip active" onclick="filterCategory('todos')">Todos</button>
        <button class="filter-chip" onclick="filterCategory('caneca')">Canecas</button>
        <button class="filter-chip" onclick="filterCategory('camisa')">Camisas</button>
        <button class="filter-chip" onclick="filterCategory('azuleijo')">Azuleijos</button>
        <button class="filter-chip" onclick="filterCategory('chaveiro')">Chaveiros</button>
        <button class="filter-chip" onclick="filterCategory('chinelo')">Chinelos</button>
    </div>

    <main class="product-grid" id="productGrid">
        <a href="paginas/caneca_branca.html" class="p-card" data-category="caneca" data-name="caneca branca classica">
            <div class="p-img"><img src="imagens/caneca_branca.png"></div>
            <div class="p-info">
                <span class="p-category">Caneca</span>
                <h3 class="p-title">Caneca Branca Clássica</h3>
                <div class="p-price">R$ 35,00</div>
            </div>
        </a>

        <a href="paginas/caneca_pro.html" class="p-card" data-category="caneca" data-name="caneca alça e borda colorida">
            <div class="p-img"><img src="imagens/caneca_pro/01.png"></div>
            <div class="p-info">
                <span class="p-category">Caneca</span>
                <h3 class="p-title">Alça & Borda Colorida</h3>
                <div class="p-price">R$ 45,00</div>
            </div>
        </a>

        <a href="paginas/chaveiro.html" class="p-card" data-category="chaveiro" data-name="chaveiro personalizado metal">
            <div class="p-img"><img src="imagens/chaveiro.png"></div>
            <div class="p-info">
                <span class="p-category">Chaveiro</span>
                <h3 class="p-title">Chaveiro de Metal</h3>
                <div class="p-price">R$ 15,00</div>
            </div>
        </a>
    </main>

    <script>
        // Lógica de Filtro por Categoria
        function filterCategory(category) {
            const cards = document.querySelectorAll('.p-card');
            const chips = document.querySelectorAll('.filter-chip');
            
            // Atualiza botões
            chips.forEach(chip => {
                chip.classList.remove('active');
                if(chip.innerText.toLowerCase().includes(category)) chip.classList.add('active');
                if(category === 'todos' && chip.innerText === 'Todos') chip.classList.add('active');
            });

            // Filtra Cards
            cards.forEach(card => {
                if (category === 'todos' || card.getAttribute('data-category') === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Lógica de Busca por Texto
        function filterSearch() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.p-card');

            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                if (name.includes(input)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>

</body>
</html>
