<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D Realista | Estamparia Gerais</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; background: #ffffff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        #canvas-container { width: 100%; height: 100vh; cursor: grab; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
    let scene, camera, renderer, controls, loaderGLTF, texLoader;

    function init() {
        const container = document.getElementById('canvas-container');
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0, 4);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(5, 10, 7);
        scene.add(light);

        loaderGLTF = new THREE.GLTFLoader();
        texLoader = new THREE.TextureLoader();

        // 1. CARREGAR A ESTAMPA
        const estampa = texLoader.load('canecas/01.jpg'); 
        estampa.flipY = false; 
        estampa.encoding = THREE.sRGBEncoding;

        // 2. CARREGAR O MODELO
        loaderGLTF.load('caneca.gltf', (gltf) => {
            const model = gltf.scene;

            model.traverse((node) => {
                if (node.isMesh) {
                    console.log("Detectada peça:", node.name);

                    // Criamos o material de porcelana branca para tudo
                    const matPorcelana = new THREE.MeshPhysicalMaterial({
                        color: 0xffffff,
                        metalness: 0,
                        roughness: 0.1,
                        clearcoat: 1.0,
                        clearcoatRoughness: 0.05,
                        side: THREE.DoubleSide
                    });

                    // LÓGICA DE IDENTIFICAÇÃO AUTOMÁTICA
                    // Em modelos de caneca, a área da estampa é quase sempre a Mesh com o maior número de faces (geometria maior)
                    // Ou nomes padrão de exportação.
                    
                    const nome = node.name.toLowerCase();
                    
                    // Verifica se é a parte da estampa (baseado nos nomes comuns do Mug3D/ThreeExporter)
                    if (nome.includes("mesh_0") || nome.includes("object_0") || nome.includes("body") || nome.includes("area")) {
                        matPorcelana.map = estampa;
                        console.log("-> Estampa aplicada em: " + node.name);
                    } else {
                        matPorcelana.map = null; // Garante que alça e interior fiquem brancos
                    }

                    node.material = matPorcelana;
                }
            });

            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            model.scale.setScalar(3.0 / box.getSize(new THREE.Vector3()).length());
            
            scene.add(model);
        });

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        renderer.render(scene, camera);
    }

    init();
    animate();
</script>
</body>
</html>
