<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | 3D Realista</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--light); color: var(--dark); }

        header {
            background: var(--white); display: flex; justify-content: space-between; align-items: center;
            padding: 0.8rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('banner.png') center/cover;
            display: flex; align-items: center; justify-content: center; text-align: center; color: white; margin-top: 60px;
        }

        .catalog { padding: 4rem 5%; max-width: 1200px; margin: 0 auto; }
        .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: white; border-radius: 15px; overflow: hidden; cursor: pointer; border: 1px solid #eee; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 280px; object-fit: cover; }

        /* MODAL 3D */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 1000px; border-radius: 20px; display: flex; height: 80vh; position: relative; overflow: hidden; }
        .close-modal { position: absolute; right: 20px; top: 10px; font-size: 40px; cursor: pointer; z-index: 100; }
        
        .modal-left { flex: 1.5; background: #ffffff; position: relative; }
        #container3d { width: 100%; height: 100%; cursor: grab; }

        .modal-right { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .price { font-size: 2.5rem; font-weight: 800; color: #16a34a; margin: 15px 0; }
        .btn-whats { background: #25d366; color: white; padding: 15px; text-align: center; text-decoration: none; border-radius: 50px; font-weight: 700; }

        @media (max-width: 800px) { .modal-content { flex-direction: column; overflow-y: auto; } .modal-left { height: 350px; flex: none; } }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 700; color: var(--primary);">Estamparia Gerais</div>
        <nav><a href="#produtos" style="text-decoration: none; color: var(--dark);">Produtos</a></nav>
    </header>

    <section class="hero">
        <h1>Simulador 3D de Canecas</h1>
    </section>

    <section class="catalog" id="produtos">
        <div class="grid-products">
            <div class="card" onclick="openModal3D('canecas/01.jpg', 'Caneca Premium', '35,00')">
                <img src="canecas/01.jpg" alt="Caneca">
                <div style="padding: 15px;"><h3>Caneca Personalizada</h3><p>R$ 35,00</p></div>
            </div>
        </div>
    </section>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-left"><div id="container3d"></div></div>
            <div class="modal-right">
                <h2 id="modalTitle">Título</h2>
                <p>Arraste para girar a caneca. Interior e alça brancos, estampa apenas no corpo.</p>
                <div class="price">R$ <span id="modalPrice">0,00</span></div>
                <a href="#" id="waLink" class="btn-whats" target="_blank">Pedir via WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader;

        function init3D(textureUrl) {
            const container = document.getElementById('container3d');
            container.innerHTML = ''; 

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 4); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // ILUMINAÇÃO REFORÇADA (Para tirar o preto)
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const light = new THREE.DirectionalLight(0xffffff, 1.0);
            light.position.set(5, 5, 5);
            scene.add(light);
            
            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();

            // Ajuste automático do caminho absoluto para evitar erro 404
            const baseUrl = window.location.href.split('#')[0].split('?')[0];
            const finalTexturePath = baseUrl + textureUrl;

            loaderGLTF.load('objetos/scene.gltf', (gltf) => {
                const model = gltf.scene;

                // Carrega a Estampa
                const estampa = texLoader.load(finalTexturePath);
                estampa.flipY = false; 
                estampa.encoding = THREE.sRGBEncoding;
                // Impede que a estampa se repita na alça e interior
                estampa.wrapS = THREE.ClampToEdgeWrapping;
                estampa.wrapT = THREE.ClampToEdgeWrapping;

                model.traverse((node) => {
                    if (node.isMesh) {
                        // FORÇA MATERIAL BRANCO (Resolve a caneca preta)
                        node.material = new THREE.MeshStandardMaterial({
                            map: estampa,
                            color: 0xffffff,
                            roughness: 0.3,
                            metalness: 0,
                            side: THREE.DoubleSide
                        });
                        node.material.needsUpdate = true;
                    }
                });

                // Centralizar e Escalar
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                const scale = 3.2 / size;
                model.scale.set(scale, scale, scale);
                
                scene.add(model);
            }, undefined, (err) => {
                console.error("Erro ao carregar o modelo GLTF:", err);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            function animate() {
                requestAnimationFrame(animate);
                if(controls) controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        function openModal3D(img, titulo, preco) {
            document.getElementById('productModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('modalPrice').innerText = preco;
            setTimeout(() => { init3D(img); }, 200);
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
    </script>
</body>
</html>
