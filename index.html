<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D | Caneca Extraída</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; background: #f1f5f9; font-family: 'Poppins', sans-serif; }
        #canvas-container { width: 100%; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        .info-badge {
            position: fixed; top: 20px; left: 20px; background: white;
            padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="info-badge">
        <strong>Modelo 3D Profissional</strong><br>
        Gire para ver todos os detalhes.
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, loader;

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. Cena e Fundo
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            // 2. Câmera
            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0.5, 4);

            // 3. Renderizador (Configurado para o máximo de realismo)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // Dá o tom de "foto"
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // 4. Luzes de Estúdio (Fundamental para o branco não ficar cinza)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const light1 = new THREE.DirectionalLight(0xffffff, 1.0);
            light1.position.set(5, 5, 5);
            scene.add(light1);

            const light2 = new THREE.DirectionalLight(0xffffff, 0.5);
            light2.position.set(-5, 5, -5);
            scene.add(light2);

            // 5. Carregar a caneca extraída
            loader = new THREE.GLTFLoader();
            // AJUSTE: Se o seu arquivo estiver em uma pasta, mude o caminho abaixo
            loader.load('caneca.gltf', (gltf) => {
                const model = gltf.scene;

                model.traverse((node) => {
                    if (node.isMesh) {
                        // Aplicamos o efeito de Porcelana em todas as partes
                        // Mas preservamos a textura (estampa) que já veio no arquivo
                        const oldMaterial = node.material;
                        
                        node.material = new THREE.MeshPhysicalMaterial({
                            map: oldMaterial.map, // Mantém a estampa original
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.1,
                            clearcoat: 1.0,      // Camada de verniz por cima
                            clearcoatRoughness: 0.05,
                            reflectivity: 0.8
                        });
                    }
                });

                // Centralização automática
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                
                scene.add(model);
            }, undefined, (error) => {
                console.error("Erro ao carregar o arquivo caneca.gltf:", error);
            });

            // 6. Controles de Mouse
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
