<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | Premium 3D</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --success: #16a34a;
            --dark: #111111; 
            --bg: #f5f5f7; 
            --white: #ffffff;
            --search-bg: #e2e8f0; 
            --header-height: clamp(80px, 12vh, 95px); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #64748b; overflow-x: hidden; }
        
        a { text-decoration: none; color: inherit; }

        /* HEADER RESPONSIVO */
        header { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(20px);
            padding: 0 5vw; 
            display: flex; justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            height: var(--header-height);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .brand { 
            display: flex; align-items: center; 
            background: var(--search-bg); 
            height: clamp(45px, 6vh, 50px);
            padding: 0 25px 0 0; 
            border-radius: 15px;
            position: relative;
            transition: 0.3s ease;
        }

        .brand img { 
            width: clamp(85px, 11vw, 100px); 
            height: auto;
            position: absolute;
            left: -15px; top: 50%;
            transform: translateY(-50%);
            filter: drop-shadow(0px 5px 12px rgba(0,0,0,0.15));
            z-index: 2;
        }

        .brand h1 {
            font-size: clamp(1rem, 2vw, 1.4rem); 
            font-weight: 800;
            letter-spacing: -1px; 
            margin-left: clamp(70px, 10vw, 80px); 
            display: flex; align-items: center;
        }

        .brand h1 span {
            background: linear-gradient(90deg, #ff007a 0%, #ff9500 20%, #ffd60a 40%, #34c759 60%, #007aff 80%, #ff007a 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: colorsPassing 4s linear infinite;
        }

        @keyframes colorsPassing {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .search-container { width: 25vw; min-width: 180px; }
        .search-container input {
            width: 100%; height: clamp(45px, 6vh, 50px); padding: 0 20px; border-radius: 15px;
            border: 1px solid #cbd5e1; background: var(--search-bg); outline: none;
            font-size: 0.9rem;
        }

        /* BANNER */
        .hero { 
            width: 100%; height: 100vh;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 100%), url('imagens/banner.png'); 
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .hero-content h2 { 
            font-size: clamp(2rem, 6vw, 3.5rem); 
            font-weight: 800; 
            text-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 10px rgba(0,0,0,0.4);
            margin-bottom: 15px;
        }

        .hero-content p {
            font-size: clamp(1rem, 1.8vw, 1.3rem);
            margin-bottom: 30px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.7);
        }

        .hero-btn { 
            background: var(--primary); color: white; padding: 1.2rem 3.5rem; 
            font-weight: 700; border-radius: 50px; display: inline-block; 
            transition: 0.4s; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
            margin-top:20px;
        }

        /* FILTROS */
        #catalogo { scroll-margin-top: 140px; }
        .filter-section { 
            padding: 2rem 5%; display: flex; gap: 10px; 
            justify-content: center; position: sticky; 
            top: var(--header-height); z-index: 100; background: var(--bg); 
        }

        .chip { 
            padding: 10px 24px; border-radius: 50px; 
            background: var(--white); border: 1px solid #e2e8f0; 
            cursor: pointer; font-size: 13px; font-weight: 700; 
            text-transform: uppercase; color: var(--dark); 
        }
        .chip.active { background: var(--dark) !important; color: var(--white) !important; }

        /* GRID */
        .container { width: 95%; max-width: 1400px; margin: 0 auto; padding: 2vh 0 10vh; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 2rem; 
        }

        .p-card { 
            background: var(--white); border-radius: 24px; 
            transition: 0.5s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .p-card:hover { transform: translateY(-12px); }

        .p-img { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; }
        .p-img img { width: 100%; height:85%; object-fit: cover; }

        .p-info { text-align: center; flex-grow: 1; padding: 10px; }
        .p-title { font-size: 1.1rem; font-weight: 700; color: var(--dark); margin-bottom: 12px; }

        .p-price-container {
            display: inline-flex; align-items: center; justify-content: center;
            background: rgba(22, 163, 74, 0.1); padding: 0.5rem 1.2rem;
            border-radius: 50px; margin-bottom: 20px;
        }
        .p-price { font-size: 1.2rem; font-weight: 800; color: var(--success); }

        .btn-more { 
            margin: 0 1.5rem 1.5rem; padding: 1rem; 
            background: var(--primary); color: white; 
            font-weight: 700; border-radius: 12px; 
            text-align: center; display: block; font-size: 0.75rem;
        }

/* --- CONFIGURAÇÕES EXCLUSIVAS PARA MOBILE --- */
@media (max-width: 768px) { 
    /* 1. Garante o Header Fixo e Menor */
    header { 
        height: 70px; 
        position: fixed; 
        top: 0; 
        left: 0;
        width: 100%;
        padding: 0 3vw;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        -webkit-transform: translate3d(0,0,0);
    }

    /* 2. Reduz a Pílula da Marca */
    .brand { 
        height: 38px; 
        padding-right: 10px;
        min-width: 0;
    }

    /* 3. Reduz a Logo Flutuante */
    .brand img { 
        width: 60px; 
        height: 60px;
        left: -8px; 
    }

    /* 4. Texto da Marca Menor */
    .brand h1 { 
        margin-left: 45px; 
        font-size: 0.85rem;
    }

    /* 5. Caixa de Busca com Margem Direita */
    .search-container { 
        width: 38vw; 
        min-width: 110px; 
        margin-right: 25px; 
    }

    .search-container input { 
        height: 38px; 
        font-size: 0.75rem;
        padding: 0 10px;
        border-radius: 10px;
    }

    /* 6. Banner Mobile com Imagem Específica */
    .hero { 
        height: auto; 
        min-height: 50vh;
        aspect-ratio: 9 / 16; 
        /* Troca para a imagem mobile conforme solicitado */
        background-image: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 100%), 
                          url('imagens/banner_mobile.png');
        background-size: cover;
        background-position: center center;
        padding-top: 70px; 
    }

    .hero-content {
        padding: 15px;
    }

    .hero-content h2 { 
        font-size: 1.6rem; 
        line-height: 1.1;
        text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    .hero-content p { 
        font-size: 0.85rem; 
        margin-bottom: 15px;
    }

    .hero-btn { 
        padding: 0.8rem 2rem; 
        font-size: 0.85rem; 
    }

    /* 7. Ajuste de Rolagem (Scroll) */
    #catalogo { 
        scroll-margin-top: 0px; 
    }

    /* 8. Grid de Produtos (2 por linha) */
    .product-grid { 
        grid-template-columns: repeat(2, 1fr); 
        gap: 12px; 
        padding: 0 10px;
    }

    .p-card {
        min-height: auto;
        border-radius: 15px;
    }

    .p-info {
        padding: 10px;
    }

    .p-title {
        font-size: 0.85rem;
    }

    .p-price {
        font-size: 0.9rem;
    }

    .btn-more {
        margin: 0 10px 10px;
        padding: 8px;
        font-size: 0.65rem;
        border-radius: 8px;
    }
}

/* Ajuste extra para celulares muito pequenos (iPhone SE, etc) */
@media (max-width: 380px) {
    .brand h1 {
        display: none; 
    }
    .search-container {
        width: 50vw;
    }

    }

    </style>
</head>
<body>

    <header>
        <a href="#" class="brand">
            <img src="imagens/logo.png" alt="Logo Estamparia Gerais">
            <h1><span>Estamparia Gerais</span></h1>
        </a>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="O que busca?" onkeyup="filterSearch()">
        </div>
    </header>

    <section class="hero">
        <div class="hero-content" data-aos="zoom-out">
            <h2>Sua Ideia, Nosso Design.</h2>
            <p>Produtos premium personalizados em 3D.</p>
            <a href="#catalogo" class="hero-btn">Explorar Agora</a>
        </div>
    </section>

    <div id="catalogo">
        <div class="filter-section">
            <button class="chip active" onclick="filterCategory('todos', this)">Todos</button>
            <button class="chip" onclick="filterCategory('caneca', this)">Canecas</button>
            <button class="chip" onclick="filterCategory('camisa', this)">Camisas</button>
            <button class="chip" onclick="filterCategory('chaveiro', this)">Chaveiros</button>
        </div>

        <div class="container">
            <main class="product-grid" id="productGrid">
                
                <a href="paginas/caneca_pro.html" class="p-card" data-category="caneca" data-name="caneca alça borda colorida">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Caneca Alça & Borda</h3>
                        <div class="p-price-container"><span class="p-price">R$ 45,00</span></div>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

                <a href="#" class="p-card" data-category="caneca" data-name="caneca branca clássica">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Caneca Branca Clássica</h3>
                        <div class="p-price-container"><span class="p-price">R$ 35,00</span></div>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

                <a href="#" class="p-card" data-category="camisa" data-name="camiseta personalizada">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Camiseta Algodão</h3>
                        <div class="p-price-container"><span class="p-price">R$ 59,90</span></div>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

                <a href="#" class="p-card" data-category="chaveiro" data-name="chaveiro personalizado">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Chaveiro Metal</h3>
                        <div class="p-price-container"><span class="p-price">R$ 15,00</span></div>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

            </main>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        function filterCategory(category, element) {
            const cards = document.querySelectorAll('.p-card');
            const chips = document.querySelectorAll('.chip');
            chips.forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            cards.forEach(card => {
                const cardCategory = card.getAttribute('data-category');
                card.style.display = (category === 'todos' || cardCategory === category) ? 'flex' : 'none';
            });
            AOS.refresh();
        }

        function filterSearch() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.p-card');
            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                card.style.display = name.includes(input) ? 'flex' : 'none';
            });
            AOS.refresh();
        }
    </script>
</body>
</html>
