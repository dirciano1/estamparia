<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | Personalizados 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }

        /* --- HEADER --- */
        header {
            background: var(--white); display: flex; justify-content: space-between; align-items: center;
            padding: 0.8rem 5%; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 45px; border-radius: 5px; }
        .brand-name { font-weight: 700; font-size: 1.3rem; color: var(--primary); text-decoration: none; }
        
        .search-container { flex: 1; max-width: 400px; margin: 0 30px; }
        .search-container input { 
            width: 100%; padding: 10px 20px; border-radius: 25px; border: 1px solid #ddd; 
            outline: none; background: #f1f5f9; transition: 0.3s;
        }

        /* --- HERO BANNER --- */
        .hero {
            height: 85vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('banner.png');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; text-align: center; color: white;
        }
        .hero-content h1 { font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 15px; font-weight: 700; }
        .btn-hero { 
            background: var(--primary); color: white; padding: 15px 45px; 
            border-radius: 50px; text-decoration: none; font-weight: 600; display: inline-block;
        }

        /* --- CATALOGO --- */
        .catalog { padding: 5rem 5%; max-width: 1300px; margin: 0 auto; }
        .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2.5rem; }
        .card { background: white; border-radius: 20px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #eee; text-align: center; }
        .card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 1.5rem; }

        /* --- MODAL 3D --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 1100px; border-radius: 25px; display: flex; height: 85vh; position: relative; overflow: hidden; }
        .close-modal { position: absolute; right: 25px; top: 15px; font-size: 40px; cursor: pointer; z-index: 10; color: #64748b; }
        
        .modal-left { flex: 1.4; background: #ffffff; position: relative; border-right: 1px solid #eee; }
        #container3d { width: 100%; height: 100%; cursor: grab; }

        .modal-right { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .price-modal { font-size: 2.5rem; font-weight: 800; color: #16a34a; margin: 20px 0; }
        .btn-whats { background: #25d366; color: white; padding: 18px; text-align: center; text-decoration: none; border-radius: 50px; font-weight: 700; }

        @media (max-width: 850px) {
            .modal-content { flex-direction: column; overflow-y: auto; }
            .modal-left { height: 400px; flex: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="logo.png" alt="" class="logo-img">
            <a href="#" class="brand-name">Estamparia Gerais</a>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pesquisar produto..." onkeyup="searchProducts()">
        </div>
        <nav><a href="#produtos" style="text-decoration: none; color: var(--dark); font-weight: 600;">Catálogo</a></nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Personalizados em 3D</h1>
            <p>Veja seu produto antes de ficar pronto.</p>
            <a href="#produtos" class="btn-hero">Explorar Catálogo</a>
        </div>
    </section>

    <section class="catalog" id="produtos">
        <div class="grid-products" id="productGrid">
            <div class="card" onclick="openModal3D('canecas/01.jpg', 'Caneca de Cerâmica', '35,00')">
                <img src="canecas/01.jpg" alt="Caneca">
                <div class="card-info"><h3>Caneca Premium</h3><p>R$ 35,00</p><span>Ver em 3D</span></div>
            </div>
        </div>
    </section>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-left">
                <div id="container3d"></div>
            </div>
            <div class="modal-right">
                <h2 id="modalTitle">Título do Produto</h2>
                <p>Gire o modelo 3D para visualizar a personalização.</p>
                <div class="price-modal">R$ <span id="modalPrice">0,00</span></div>
                <a href="#" id="waLink" class="btn-whats" target="_blank">Pedir via WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader;

        function init3D(textureUrl) {
            const container = document.getElementById('container3d');
            container.innerHTML = ''; 

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 4); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // ILUMINAÇÃO DE ESTÚDIO (Corrige a caneca preta)
            scene.add(new THREE.AmbientLight(0xffffff, 1.5)); // Luz ambiente forte
            const light = new THREE.DirectionalLight(0xffffff, 1.0);
            light.position.set(5, 5, 5);
            scene.add(light);
            
            const light2 = new THREE.DirectionalLight(0xffffff, 0.5);
            light2.position.set(-5, 2, -5);
            scene.add(light2);

            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();

            // Configura caminho para a pasta objetos
            loaderGLTF.setPath('objetos/'); 
            loaderGLTF.load('scene.gltf', (gltf) => {
                const model = gltf.scene;

                // Carrega a estampa
                const estampa = texLoader.load('../' + textureUrl); // Volta uma pasta para achar a imagem
                estampa.flipY = false; 
                estampa.encoding = THREE.sRGBEncoding;

                model.traverse((node) => {
                    if (node.isMesh) {
                        // Força o material a ser cerâmica branca brilhante
                        node.material = new THREE.MeshPhongMaterial({
                            map: estampa,
                            color: 0xffffff, // Garante que a caneca seja branca
                            shininess: 100
                        });
                        node.material.needsUpdate = true;
                    }
                });

                // Escala e Centralização
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                const scale = 2.8 / size;
                model.scale.set(scale, scale, scale);
                
                scene.add(model);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            function animate() {
                requestAnimationFrame(animate);
                if(controls) controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        function openModal3D(img, titulo, preco) {
            document.getElementById('productModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('modalPrice').innerText = preco;
            setTimeout(() => { init3D(img); }, 200);
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }

        function searchProducts() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(input) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
