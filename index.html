<style>
    :root { 
        --primary: #2563eb; 
        --dark: #0f172a; 
        --bg: #ffffff; 
        /* Sombra 3D que agora projeta para todos os lados, inclusive para cima */
        --shadow-3d: 0 -5px 25px rgba(0,0,0,0.04), 0 15px 35px rgba(15, 23, 42, 0.12);
        --shadow-hover: 0 40px 80px rgba(15, 23, 42, 0.25);
    }

    .product-grid { 
        padding: 100px 5% 120px;
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
        gap: 50px; 
    }
    
    .p-card { 
        background: white; 
        border-radius: 32px; 
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
        /* Borda sutil no topo para não misturar com o fundo */
        border: 1px solid rgba(0,0,0,0.08); 
        box-shadow: var(--shadow-3d);
        display: flex; 
        flex-direction: column; 
        position: relative;
        text-decoration: none; 
        color: inherit;
        overflow: visible;
    }

    .p-card:hover { 
        transform: translateY(-30px);
        box-shadow: var(--shadow-hover);
        border-color: var(--primary);
    }
    
    /* IMAGEM: Agora maior e com menos espaço sobrando */
    .p-img { 
        width: 100%; 
        height: 280px; /* Aumentado para destacar o produto */
        display: flex; 
        align-items: center; 
        justify-content: center; 
        padding: 10px; /* Reduzido o espaço interno */
        background: #fdfdfd;
        border-radius: 32px 32px 0 0;
    }
    .p-img img { 
        max-width: 95%; 
        max-height: 95%; 
        object-fit: contain; 
        transition: 0.5s;
        /* Efeito de flutuação na própria imagem */
        filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
    }
    
    .p-info { padding: 20px 30px; text-align: center; }
    .p-category { font-size: 11px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .p-title { font-size: 19px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .p-price { font-size: 22px; font-weight: 800; color: var(--dark); margin-bottom: 20px; }

    .btn-more { 
        margin: 0 30px 30px; 
        padding: 15px; 
        background: var(--primary); 
        color: white; 
        font-weight: 700; 
        font-size: 13px; 
        text-transform: uppercase; 
        border-radius: 16px; 
        transition: 0.4s; 
        text-align: center;
        border: 2px solid var(--primary);
    }
    .p-card:hover .btn-more { 
        background: white; 
        color: var(--primary); 
    }
</style>

<main class="product-grid">
    <a href="paginas/caneca_branca.html" class="p-card">
        <div class="p-img">
            <img src="imagens/caneca_branca.png" alt="Caneca Branca">
        </div>
        <div class="p-info">
            <span class="p-category">Cerâmica Premium</span>
            <h3 class="p-title">Caneca Branca Clássica</h3>
            <div class="p-price">R$ 35,00</div>
        </div>
        <div class="btn-more">Veja mais modelos</div>
    </a>

    <a href="paginas/caneca_pro.html" class="p-card">
        <div class="p-img">
            <img src="imagens/caneca_pro/01.png" alt="Caneca Alça & Borda">
        </div>
        <div class="p-info">
            <span class="p-category">Edição Color</span>
            <h3 class="p-title">Caneca Alça & Borda</h3>
            <div class="p-price">R$ 45,00</div>
        </div>
        <div class="btn-more">Veja mais modelos</div>
    </a>
</main>
