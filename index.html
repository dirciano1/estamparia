<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Gerais | Premium 3D</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --success: #16a34a;
            --dark: #111111; 
            --bg: #f5f5f7; 
            --white: #ffffff;
            --search-bg: #e2e8f0; 
            --header-height: 70px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #64748b; overflow-x: hidden; }
        
        a { text-decoration: none; color: inherit; }

        /* HEADER */
        header { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(20px);
            padding: 0 5vw; 
            display: flex; justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            height: var(--header-height);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .brand-container {
            display: flex;
            align-items: center;
            flex-grow: 1;
            transition: 0.3s ease;
        }

        .brand { 
            display: flex; align-items: center; 
            background: var(--search-bg); 
            height: 40px;
            padding: 0 15px 0 0; 
            border-radius: 12px;
            position: relative;
            white-space: nowrap;
        }

        .brand img { 
            width: 55px; height: auto;
            position: absolute;
            left: -10px; top: 50%;
            transform: translateY(-50%);
            filter: drop-shadow(0px 5px 12px rgba(0,0,0,0.15));
            z-index: 2;
        }

        .brand h1 {
            font-size: 0.85rem; 
            font-weight: 800;
            margin-left: 50px; 
        }

        .brand h1 span {
            background: linear-gradient(90deg, #ff007a, #ff9500, #34c759, #007aff, #ff007a);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorsPassing 4s linear infinite;
        }

        @keyframes colorsPassing {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* BUSCA EXPANSÍVEL NO MOBILE */
        .search-container { 
            width: 200px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-left: 10px;
            position: relative;
        }

        .search-container input {
            width: 100%; height: 40px; padding: 0 15px; border-radius: 12px;
            border: 1px solid #cbd5e1; background: var(--search-bg); outline: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        /* HERO - BANNER 100% COVER */
        .hero { 
            width: 100%; 
            height: 100vh;
            height: 100svh;
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%), url('imagens/banner.png'); 
            background-size: cover; 
            background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .hero-content h2 { 
            font-size: clamp(1.8rem, 8vw, 3.5rem); 
            font-weight: 800; 
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            line-height: 1.1;
        }

        .hero-content p {
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            margin: 10px 0 25px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .hero-btn { 
            background: var(--primary); color: white; padding: 1rem 2.5rem; 
            font-weight: 700; border-radius: 50px; display: inline-block; 
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        /* FILTROS COM SCROLL HORIZONTAL MODERNO */
        #catalogo { 
            scroll-margin-top: var(--header-height); 
        }

        .filter-wrapper {
            position: sticky;
            top: var(--header-height);
            z-index: 100;
            background: var(--bg);
            padding: 15px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .filter-section { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            padding: 0 5%;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .filter-section::-webkit-scrollbar { height: 3px; }
        .filter-section::-webkit-scrollbar-track { background: transparent; }
        .filter-section::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .chip { 
            flex: 0 0 auto;
            padding: 8px 20px; border-radius: 50px; 
            background: var(--white); border: 1px solid #e2e8f0; 
            cursor: pointer; font-size: 12px; font-weight: 700; 
            text-transform: uppercase; color: var(--dark); 
        }
        .chip.active { background: var(--dark); color: var(--white); border-color: var(--dark); }

        /* GRID */
        .container { width: 95%; max-width: 1200px; margin: 0 auto; padding: 20px 0 50px; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .p-card { 
            background: var(--white); border-radius: 20px; 
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .p-img img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .p-info { padding: 12px; text-align: center; }
        .p-title { font-size: 0.85rem; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
        .p-price-container { background: rgba(22, 163, 74, 0.1); padding: 4px 10px; border-radius: 50px; display: inline-block; }
        .p-price { font-size: 0.9rem; font-weight: 800; color: var(--success); }
        .btn-more { margin: 0 12px 12px; padding: 10px; background: var(--primary); color: white; font-weight: 700; border-radius: 10px; text-align: center; font-size: 0.7rem; }

        /* --- LOGICA MOBILE: H1 SEMPRE VISIVEL + BUSCA COMPACTA --- */
        @media (max-width: 768px) {
            header { padding: 0 3vw; }
            .hero { background-image: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.5) 100%), url('imagens/banner_mobile.png'); }

            /* Busca começa pequena */
            .search-container {
                width: 110px;
                margin-left: 5px;
            }

            /* Quando clica no input para buscar */
            .search-container:focus-within {
                position: absolute;
                right: 3vw;
                width: 94vw;
                z-index: 10;
            }

            .search-container:focus-within input {
                background: var(--white);
                border-color: var(--primary);
                box-shadow: 0 0 0 50px rgba(255,255,255,1); /* Efeito de cobrir o fundo */
            }

            /* Mantém o H1, mas reduz um pouco a letra se necessário */
            .brand h1 { font-size: 0.75rem; margin-left: 42px; }
            .brand img { width: 48px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <a href="#" class="brand">
                <img src="imagens/logo.png" alt="Logo Estamparia Gerais">
                <h1><span>Estamparia Gerais</span></h1>
            </a>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="filterSearch()">
        </div>
    </header>

    <section class="hero">
        <div class="hero-content" data-aos="zoom-out">
            <h2>Sua Ideia,<br>Nosso Design.</h2>
            <p>Produtos premium personalizados em 3D.</p>
            <a href="#catalogo" class="hero-btn">Explorar Agora</a>
        </div>
    </section>

    <div id="catalogo">
        <div class="filter-wrapper">
            <div class="filter-section">
                <button class="chip active" onclick="filterCategory('todos', this)">Todos</button>
                <button class="chip" onclick="filterCategory('caneca', this)">Canecas</button>
                <button class="chip" onclick="filterCategory('camisa', this)">Camisas</button>
                <button class="chip" onclick="filterCategory('chaveiro', this)">Chaveiros</button>
                <button class="chip" onclick="filterCategory('quadro', this)">Quadros</button>
                <button class="chip" onclick="filterCategory('brinde', this)">Brindes</button>
            </div>
        </div>

        <div class="container">
            <main class="product-grid" id="productGrid">
                
                <a href="paginas/caneca_pro.html" class="p-card" data-category="caneca" data-name="caneca alça borda colorida">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Caneca Alça & Borda</h3>
                        <div class="p-price-container"><span class="p-price">R$ 45,00</span></div>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

                <a href="#" class="p-card" data-category="caneca" data-name="caneca branca clássica">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Caneca Branca</h3>
                        <div class="p-price-container"><span class="p-price">R$ 35,00</span></div>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

                <a href="#" class="p-card" data-category="camisa" data-name="camiseta personalizada">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Camiseta Algodão</h3>
                        <div class="p-price-container"><span class="p-price">R$ 59,90</span></div>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

                <a href="#" class="p-card" data-category="chaveiro" data-name="chaveiro personalizado">
                    <div class="p-img"><img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png"></div>
                    <div class="p-info">
                        <h3 class="p-title">Chaveiro Metal</h3>
                        <div class="p-price-container"><span class="p-price">R$ 15,00</span></div>
                    </div>
                    <div class="btn-more">Veja Modelos</div>
                </a>

            </main>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        function filterCategory(category, element) {
            const cards = document.querySelectorAll('.p-card');
            const chips = document.querySelectorAll('.chip');
            chips.forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            
            cards.forEach(card => {
                const cardCategory = card.getAttribute('data-category');
                card.style.display = (category === 'todos' || cardCategory === category) ? 'flex' : 'none';
            });
            AOS.refresh();
        }

        function filterSearch() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.p-card');
            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                card.style.display = name.includes(input) ? 'flex' : 'none';
            });
            AOS.refresh();
        }
    </script>
</body>
</html>
