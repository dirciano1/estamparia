<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Caneca Colher - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, model3D;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();

            // --- LÓGICA DO HASH (PARAMETROS URL) ---
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] ? "#" + partes[1].replace("#", "") : "#ffffff"; 
            
            // 3º Parâmetro: Cor do Background (Padrão: Cinza #999999)
            const corFundoCena = partes[2] ? "#" + partes[2].replace("#", "") : "#999999";
            scene.background = new THREE.Color(corFundoCena);

            // --- AJUSTE DE CÂMERA ---
            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3.5, 2.5, 8.0); 

            // --- RENDERER ---
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.NoToneMapping; 
            container.appendChild(renderer.domElement);

            // --- ILUMINAÇÃO ---
            scene.add(new THREE.AmbientLight(0xffffff, 0.5)); 
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');

            // Carregamento da Estampa
            let estampa = null;
            if (idImgur && idImgur.trim() !== "") {
                estampa = texLoader.load(`https://i.imgur.com/${idImgur}.jpeg`);
                estampa.flipY = false;
                estampa.encoding = THREE.sRGBEncoding;
            }

            const corParametro = new THREE.Color(corHexLink);

            // --- CARREGAMENTO DO MODELO ---
            const loader = new THREE.GLTFLoader();
            loader.load('objetos/caneca_colher/caneca_colher.gltf', (gltf) => {
                model3D = gltf.scene;

                model3D.traverse((node) => {
                    if (node.isMesh) {
                        const mat = new THREE.MeshStandardMaterial({
                            color: 0xffffff,
                            metalness: 0.1,
                            roughness: 0.4, 
                            side: THREE.DoubleSide
                        });

                        // Parte branca e Estampa
                        if (node.name === "Cylinder001_1" || node.name === "Cylinder001_2") {
                            mat.color.set(0xffffff);
                            if (node.name === "Cylinder001_2" && estampa) mat.map = estampa;
                        }

                        // Partes coloridas (Alça, colher, interior)
                        if (["Cylinder001_3", "Cylinder001_4", "Cylinder001_5"].includes(node.name)) {
                            mat.color.copy(corParametro);
                        }
                        node.material = mat;
                    }
                });

                // Centralização
                const box = new THREE.Box3().setFromObject(model3D);
                const center = box.getCenter(new THREE.Vector3());
                model3D.position.sub(center);
                model3D.position.y = -0.5; 
                scene.add(model3D);
            });

            // --- CONTROLES ---
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;
            
            controls.minDistance = 4; 
            controls.maxDistance = 15; 
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('hashchange', () => window.location.reload());
            
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
