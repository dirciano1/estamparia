<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader;

        // Peças que recebem a cor escolhida no painel
        const PECAS_COLORIDAS = ["Cylinder001_5", "Cylinder001_4", "Cylinder001_3"]; 

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x999999);

            // --- AJUSTE DE ZOOM INICIAL (50%) ---
            // Aumentado Z para 8.0 para a caneca começar mais distante
            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3.5, 2.5, 8.0); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // --- AJUSTE DE FIDELIDADE DE COR ---
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.NoToneMapping; // Sem lavagem de cor (Azul fica real)
            container.appendChild(renderer.domElement);

            // Iluminação balanceada
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0xffffff, 0.3);
            light.position.set(5, 10, 7);
            scene.add(light);

            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');

            // --- LÓGICA DO HASH ---
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] ? (partes[1].startsWith('#') ? partes[1] : "#" + partes[1]) : "#ffffff";

            let estampa = null;
            if (idImgur && idImgur.trim() !== "") {
                estampa = texLoader.load(`https://i.imgur.com/${idImgur}.jpeg`);
                estampa.flipY = false;
                estampa.encoding = THREE.sRGBEncoding;
            }

            const corObjeto = new THREE.Color(corHexLink);

            // --- CARREGAMENTO DO MODELO ---
            loaderGLTF.load('objetos/caneca_porcelana/caneca.gltf', (gltf) => {
                const model = gltf.scene;

                model.traverse((node) => {
                    if (node.isMesh) {
                        const mat = new THREE.MeshStandardMaterial({
                            color: 0xffffff,
                            metalness: 0.1,
                            roughness: 0.4, // Brilho controlado para não desbotar a cor
                            side: THREE.DoubleSide
                        });

                        // Aplica a cor nas peças específicas (Alça/Fundo)
                        if (PECAS_COLORIDAS.includes(node.name)) {
                            mat.color.copy(corObjeto);
                        }

                        // Aplica a estampa no corpo da caneca
                        if (node.name === "Cylinder001_2" && estampa) {
                            mat.map = estampa;
                        }

                        node.material = mat;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                model.position.y = -0.5; // Centraliza verticalmente melhor
                
                scene.add(model);
            });

            // --- CONTROLES E LIMITES ---
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;
            controls.minDistance = 4;  // Limite de zoom próximo
            controls.maxDistance = 15; // Limite de zoom afastado

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('hashchange', () => window.location.reload());
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
