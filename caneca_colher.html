<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caneca com Colher - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, model3D, currentEstampa = null;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0.5, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');

            // --- LÓGICA DO LINK (#ID_IMGUR|#COR) ---
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] || "#ffffff"; 

            if (idImgur && idImgur.trim() !== "") {
                const urlImgur = `https://i.imgur.com/${idImgur}.jpeg`;
                currentEstampa = texLoader.load(urlImgur);
                currentEstampa.flipY = false;
                currentEstampa.encoding = THREE.sRGBEncoding;
            }

            const corObjeto = new THREE.Color(corHexLink);
            corObjeto.convertSRGBToLinear();

            const loader = new THREE.GLTFLoader();
            loader.load('caneca_colher.gltf', (gltf) => {
                model3D = gltf.scene;

                model3D.traverse((node) => {
                    if (node.isMesh && node.name === "Cylinder001") {
                        // Como o modelo tem múltiplos materiais no mesmo objeto:
                        const materials = [];
                        
                        for (let i = 0; i < 5; i++) {
                            materials[i] = new THREE.MeshPhysicalMaterial({
                                color: 0xffffff,
                                roughness: 0.1,
                                clearcoat: 1.0,
                                side: THREE.DoubleSide
                            });
                        }

                        // Mapeamento baseado no seu arquivo:
                        // Material 1 (índice 1): Corpo da Caneca (onde vai a estampa)
                        if (currentEstampa) {
                            materials[1].map = currentEstampa;
                        }

                        // Materiais que recebem a cor (Alça, Interior, Colher, Fundo):
                        // Baseado nas cores padrão do seu arquivo (Verde, Azul, Amarelo):
                        // Índices 2, 3 e 4 são as partes coloridas no seu GLTF
                        materials[2].color.copy(corObjeto); // Parte Verde no arquivo
                        materials[3].color.copy(corObjeto); // Parte Azul no arquivo
                        materials[4].color.copy(corObjeto); // Parte Amarela (Alça/Colher) no arquivo

                        node.material = materials;
                    }
                });

                const box = new THREE.Box3().setFromObject(model3D);
                model3D.position.sub(box.getCenter(new THREE.Vector3()));
                model3D.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                scene.add(model3D);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('hashchange', () => window.location.reload());
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
