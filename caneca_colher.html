<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Caneca Colher - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, model3D;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0.5, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            // --- PROCESSAMENTO DO LINK (#ID|#COR) ---
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            
            // Valores padrão: Branco (#ffffff) e Sem Imagem
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] || "#ffffff"; 

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');
            
            let estampa = null;
            if (idImgur && idImgur.trim() !== "") {
                estampa = texLoader.load(`https://i.imgur.com/${idImgur}.jpeg`);
                estampa.flipY = false;
                estampa.encoding = THREE.sRGBEncoding;
            }

            // Converte a cor para o formato do Three.js
            const corFinal = new THREE.Color(corHexLink).convertSRGBToLinear();

            const loader = new THREE.GLTFLoader();
            loader.load('caneca_colher.gltf', (gltf) => {
                model3D = gltf.scene;

                model3D.traverse((node) => {
                    if (node.isMesh && node.name === "Cylinder001") {
                        
                        // Criamos 5 materiais novos e BRANCOS por padrão
                        const materiaisNovos = [];
                        for (let i = 0; i < 5; i++) {
                            materiaisNovos[i] = new THREE.MeshPhysicalMaterial({
                                color: 0xffffff, // Inicia Branco
                                roughness: 0.1,
                                clearcoat: 1.0,
                                side: THREE.DoubleSide,
                                map: null // Garante que ignore a textura interna do arquivo
                            });
                        }

                        // APLICAÇÃO DINÂMICA (Se houver dados no link)
                        
                        // 1. Aplica a estampa no corpo (índice 1)
                        if (estampa) {
                            materiaisNovos[1].map = estampa;
                        }

                        // 2. Aplica a cor na Alça, Colher e Fundo (índices 2, 3 e 4)
                        materiaisNovos[2].color.copy(corFinal);
                        materiaisNovos[3].color.copy(corFinal);
                        materiaisNovos[4].color.copy(corFinal);

                        node.material = materiaisNovos;
                    }
                });

                // Centralizar o modelo na tela
                const box = new THREE.Box3().setFromObject(model3D);
                const center = box.getCenter(new THREE.Vector3());
                model3D.position.sub(center);
                model3D.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                
                scene.add(model3D);
            }, undefined, (error) => {
                console.error("Erro: Certifique-se que 'model.bin' está na mesma pasta.");
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
