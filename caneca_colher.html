<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Caneca Colher - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f4f4f4; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, model3D;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf4f4f4); 

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.2, 4); // Câmera de frente e um pouco alta para ver o grid

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');

            // --- NOVO CHÃO DE GRID (IGUAL À OUTRA CANECA) ---
            
            // 1. Carrega uma imagem de grade. 
            // Dica: Crie uma imagem de 128x128px branca com linhas pretas finas e salve como grid.png.
            const gridTexture = texLoader.load('grid.png'); // Substitua pela sua imagem de grid
            gridTexture.wrapS = THREE.RepeatWrapping;
            gridTexture.wrapT = THREE.RepeatWrapping;
            gridTexture.repeat.set(10, 10); // Quantas vezes a grade se repete

            // 2. Cria o plano do chão
            const groundGeometry = new THREE.PlaneGeometry(5, 5); // Tamanho 5x5 metros
            const groundMaterial = new THREE.MeshBasicMaterial({ 
                map: gridTexture, 
                transparent: true, 
                opacity: 0.2, // Deixa o grid discreto
                depthWrite: false // Impede que o grid "atravesse" a caneca se o zoom for longe
            });
            const groundMesh = new THREE.Mesh(groundGeometry, groundMaterial);
            groundMesh.rotation.x = -Math.PI / 2; // Gira para ficar horizontal
            groundMesh.position.y = -0.96; // Ajusta para ficar logo abaixo da base (Parte 1)
            scene.add(groundMesh);

            // --- LUZES ---
            scene.add(new THREE.HemisphereLight(0xffffff, 0x999999, 1.2));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // --- PROCESSAMENTO DO LINK ---
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] || "#ffffff"; 

            let estampa = null;
            if (idImgur) {
                estampa = texLoader.load(`https://i.imgur.com/${idImgur}.jpeg`);
                estampa.flipY = false;
                estampa.encoding = THREE.sRGBEncoding;
            }

            const corParametro = new THREE.Color(corHexLink).convertSRGBToLinear();

            // --- CARREGAMENTO DO MODELO (SUAS 5 PARTES) ---
            const loader = new THREE.GLTFLoader();
            loader.load('caneca_colher.gltf', (gltf) => {
                model3D = gltf.scene;

                model3D.traverse((node) => {
                    if (node.isMesh) {
                        const mat = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            roughness: 0.05,
                            clearcoat: 1.0,
                            side: THREE.DoubleSide
                        });

                        // Lógica baseada no seu mapeamento:
                        
                        // Parte 1 (Base) e Parte 2 (Corpo): Ficam Brancas
                        if (node.name === "Cylinder001_1" || node.name === "Cylinder001_2") {
                            mat.color.set(0xffffff);
                            // Aplica estampa apenas na Parte 2
                            if (node.name === "Cylinder001_2" && estampa) mat.map = estampa;
                        }

                        // Partes 3, 4 e 5: Mudam juntas com a cor do link
                        if (["Cylinder001_3", "Cylinder001_4", "Cylinder001_5"].includes(node.name)) {
                            mat.color.copy(corParametro);
                        }

                        node.material = mat;
                    }
                });

                // Centralização
                const box = new THREE.Box3().setFromObject(model3D);
                model3D.position.sub(box.getCenter(new THREE.Vector3()));
                model3D.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                scene.add(model3D);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
