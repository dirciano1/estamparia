<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DEBUG - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #222; color: white; font-family: monospace; }
        #canvas-container { width: 100vw; height: 80vh; }
        #log { height: 20vh; overflow-y: scroll; padding: 10px; background: #000; font-size: 12px; border-top: 2px solid #444; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="log">--- LOG DE DIAGNÓSTICO ---<br></div>

    <script>
        const logElement = document.getElementById('log');
        function debugLog(msg, color = "white") {
            logElement.innerHTML += `<span style="color:${color}">${msg}</span><br>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        let scene, camera, renderer, controls;

        function init() {
            try {
                const container = document.getElementById('canvas-container');
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x333333);

                camera = new THREE.PerspectiveCamera(45, window.innerWidth / (window.innerHeight * 0.8), 0.1, 1000);
                camera.position.set(0, 2, 5);

                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight * 0.8);
                container.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 1));
                debugLog("✅ Engine Three.js iniciada.");

                // TESTE 1: CUBO DE EMERGÊNCIA
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);
                debugLog("📦 Cubo de teste adicionado. Você deve ver um quadrado vermelho.");

                // TESTE 2: CARREGAMENTO DO GLTF
                const loader = new THREE.GLTFLoader();
                debugLog("⏳ Tentando carregar: caneca_colher.gltf...");

                loader.load('caneca_colher.gltf', 
                    (gltf) => {
                        debugLog("🎉 ARQUIVO CARREGADO COM SUCESSO!", "lime");
                        scene.remove(cube); // Remove o cubo se a caneca carregar
                        
                        const model = gltf.scene;
                        scene.add(model);
                        
                        model.traverse(node => {
                            if(node.isMesh) debugLog("🔹 Mesh encontrada: " + node.name, "cyan");
                        });
                    },
                    (xhr) => {
                        const percent = (xhr.loaded / xhr.total * 100);
                        if(percent) debugLog(`Loading: ${percent.toFixed(0)}%`);
                    },
                    (error) => {
                        debugLog("❌ ERRO NO CARREGAMENTO: " + error.message, "red");
                        console.error(error);
                    }
                );

                controls = new THREE.OrbitControls(camera, renderer.domElement);
                animate();

            } catch (e) {
                debugLog("CRITICAL ERROR: " + e.message, "red");
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
