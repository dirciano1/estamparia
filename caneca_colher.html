<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Caneca Colher - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, model3D;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0); 

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 1.5, 5); // Câmera um pouco mais alta para ver o grid

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.shadowMap.enabled = true; // Habilita sombras
            container.appendChild(renderer.domElement);

            // --- GRID (O CHÃO) ---
            // Tamanho 10, dividido em 20 segmentos. Cores: cinza escuro e cinza claro.
            const grid = new THREE.GridHelper(10, 20, 0xcccccc, 0xdddddd);
            grid.position.y = -0.95; // Ajusta para ficar logo abaixo da base da caneca
            scene.add(grid);

            // --- LUZES ---
            scene.add(new THREE.HemisphereLight(0xffffff, 0xaaaaaa, 1.0));
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true; // A luz projeta sombra no chão
            scene.add(dirLight);

            // --- PROCESSAMENTO DO LINK ---
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] || "#ffffff"; 

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');
            
            let estampa = null;
            if (idImgur) {
                estampa = texLoader.load(`https://i.imgur.com/${idImgur}.jpeg`);
                estampa.flipY = false;
                estampa.encoding = THREE.sRGBEncoding;
            }

            const corParametro = new THREE.Color(corHexLink).convertSRGBToLinear();

            const loader = new THREE.GLTFLoader();
            loader.load('caneca_colher.gltf', (gltf) => {
                model3D = gltf.scene;

                model3D.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true; // Caneca projeta sombra
                        node.receiveShadow = true;

                        const mat = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            roughness: 0.05,
                            clearcoat: 1.0,
                            side: THREE.DoubleSide
                        });

                        // Lógica das partes 1 a 5 (conforme seu mapeamento) 
                        if (node.name === "Cylinder001_1" || node.name === "Cylinder001_2") {
                            mat.color.set(0xffffff);
                            if (node.name === "Cylinder001_2" && estampa) mat.map = estampa;
                        }

                        if (["Cylinder001_3", "Cylinder001_4", "Cylinder001_5"].includes(node.name)) {
                            mat.color.copy(corParametro);
                        }

                        node.material = mat;
                    }
                });

                // Centralização
                const box = new THREE.Box3().setFromObject(model3D);
                model3D.position.sub(box.getCenter(new THREE.Vector3()));
                model3D.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                scene.add(model3D);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.maxDistance = 10; // Limita o zoom para não sumir o grid
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
