<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Caneca Colher - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, model3D;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 1.2, 4.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // --- AJUSTE DE FIDELIDADE DE COR ---
            renderer.outputEncoding = THREE.sRGBEncoding; // Mantém as cores vivas
            renderer.toneMapping = THREE.NoToneMapping;  // REMOVIDO o "ACESFilmic" para não clarear as cores
            container.appendChild(renderer.domElement);

            // Luz Ambiente Forte (ilumina tudo igual) + Direcional Suave
            scene.add(new THREE.AmbientLight(0xffffff, 0.8)); 
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');

            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] ? "#" + partes[1].replace("#", "") : "#ffffff"; 

            let estampa = null;
            if (idImgur) {
                estampa = texLoader.load(`https://i.imgur.com/${idImgur}.jpeg`);
                estampa.flipY = false;
                estampa.encoding = THREE.sRGBEncoding;
            }

            // Converte a cor para o espaço sRGB para bater com o painel
            const corParametro = new THREE.Color(corHexLink);

            const loader = new THREE.GLTFLoader();
            loader.load('objetos/caneca_colher/caneca_colher.gltf', (gltf) => {
                model3D = gltf.scene;

                model3D.traverse((node) => {
                    if (node.isMesh) {
                        const mat = new THREE.MeshStandardMaterial({ // Mudado para Standard para cores mais sólidas
                            color: 0xffffff,
                            metalness: 0.1,
                            roughness: 0.5, // Menos brilho evita reflexos brancos que "lavam" a cor
                            side: THREE.DoubleSide
                        });

                        if (node.name === "Cylinder001_1" || node.name === "Cylinder001_2") {
                            mat.color.set(0xffffff);
                            if (node.name === "Cylinder001_2" && estampa) mat.map = estampa;
                        }

                        // Aplica a cor exatamente como vem do link
                        if (["Cylinder001_3", "Cylinder001_4", "Cylinder001_5"].includes(node.name)) {
                            mat.color.copy(corParametro);
                        }

                        node.material = mat;
                    }
                });

                const box = new THREE.Box3().setFromObject(model3D);
                const center = box.getCenter(new THREE.Vector3());
                model3D.position.sub(center);
                model3D.position.y = 0; 
                scene.add(model3D);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('hashchange', () => window.location.reload());
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
