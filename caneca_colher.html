<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Caneca Colher - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f4f4f4; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, model3D;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            
            // Fundo levemente cinza para a caneca branca não sumir
            scene.background = new THREE.Color(0xf4f4f4);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 1, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // Luz Hemisférica: Ilumina o topo de branco e o fundo de cinza, criando volume
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0xbbbbbb, 1.0);
            scene.add(hemiLight);

            // Luz Direcional para criar brilho na porcelana (Gloss)
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // --- PROCESSAMENTO DO LINK (#ID|#COR) ---
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] || "#ffffff"; // Branco por padrão

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');
            
            let estampa = null;
            if (idImgur) {
                estampa = texLoader.load(`https://i.imgur.com/${idImgur}.jpeg`);
                estampa.flipY = false;
                estampa.encoding = THREE.sRGBEncoding;
            }

            const corObjeto = new THREE.Color(corHexLink).convertSRGBToLinear();

            const loader = new THREE.GLTFLoader();
            loader.load('caneca_colher.gltf', (gltf) => {
                model3D = gltf.scene;

                model3D.traverse((node) => {
                    if (node.isMesh && node.name === "Cylinder001") {
                        const materiaisNovos = [];
                        
                        for (let i = 0; i < 5; i++) {
                            materiaisNovos[i] = new THREE.MeshPhysicalMaterial({
                                color: 0xffffff,
                                roughness: 0.05, // Mais liso para brilhar mais
                                clearcoat: 1.0,  // Camada de verniz
                                clearcoatRoughness: 0.02,
                                side: THREE.DoubleSide,
                                map: null 
                            });
                        }

                        // Mapeamento:
                        // Índice 1: Estampa
                        if (estampa) materiaisNovos[1].map = estampa;

                        // Índices 2, 3 e 4: Alça, Colher, Interior, Fundo e Borda
                        materiaisNovos[2].color.copy(corObjeto);
                        materiaisNovos[3].color.copy(corObjeto);
                        materiaisNovos[4].color.copy(corObjeto);

                        node.material = materiaisNovos;
                    }
                });

                const box = new THREE.Box3().setFromObject(model3D);
                model3D.position.sub(box.getCenter(new THREE.Vector3()));
                model3D.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                scene.add(model3D);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
