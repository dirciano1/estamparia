<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Caneca Colher - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, model3D;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); // Fundo branco igual à outra

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 1.2, 4.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // --- CONFIGURAÇÃO DE LUZ IGUAL À PRIMEIRA CANECA ---
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // Dá o aspecto de "cinema"
            renderer.toneMappingExposure = 1.0; 
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0)); // Luz ambiente 1.0
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); // Luz direcional 0.8
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');

            // --- GRID (CHÃO) DISCRETO ---
            const gridTexture = texLoader.load('grid.png'); 
            gridTexture.wrapS = gridTexture.wrapT = THREE.RepeatWrapping;
            gridTexture.repeat.set(10, 10);
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(5, 5),
                new THREE.MeshBasicMaterial({ map: gridTexture, transparent: true, opacity: 0.15, depthWrite: false })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.96;
            scene.add(ground);

            // --- LÓGICA DO LINK ---
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] || "#ffffff"; 

            let estampa = null;
            if (idImgur) {
                estampa = texLoader.load(`https://i.imgur.com/${idImgur}.jpeg`);
                estampa.flipY = false;
                estampa.encoding = THREE.sRGBEncoding;
            }

            const corParametro = new THREE.Color(corHexLink).convertSRGBToLinear();

            const loader = new THREE.GLTFLoader();
            loader.load('caneca_colher.gltf', (gltf) => {
                model3D = gltf.scene;

                model3D.traverse((node) => {
                    if (node.isMesh) {
                        // Material de porcelana com os valores da sua primeira caneca
                        const mat = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.05,
                            clearcoat: 1.0,
                            clearcoatRoughness: 0.02,
                            side: THREE.DoubleSide
                        });

                        // MAPEAMENTO DAS PARTES 1 A 5
                        // Parte 1 (Base) e Parte 2 (Corpo)
                        if (node.name === "Cylinder001_1" || node.name === "Cylinder001_2") {
                            mat.color.set(0xffffff);
                            if (node.name === "Cylinder001_2" && estampa) mat.map = estampa;
                        }

                        // Parte 3 (Borda), 4 (Interior) e 5 (Colher+Alça)
                        if (["Cylinder001_3", "Cylinder001_4", "Cylinder001_5"].includes(node.name)) {
                            mat.color.copy(corParametro);
                        }

                        node.material = mat;
                    }
                });

                const box = new THREE.Box3().setFromObject(model3D);
                model3D.position.sub(box.getCenter(new THREE.Vector3()));
                model3D.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                scene.add(model3D);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.5;
            
            window.addEventListener('hashchange', () => window.location.reload());
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
