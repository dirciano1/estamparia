<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caneca Premium | Estamparia Gerais</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --success: #16a34a;
            --dark: #111111; 
            --bg: #f5f5f7; 
            --white: #ffffff;
            --search-bg: #e2e8f0; 
            --header-h: 60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #64748b; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        
        header { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 0 4vw; 
            display: flex; justify-content: space-between; align-items: center; 
            height: var(--header-h);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .brand { display: flex; align-items: center; background: var(--search-bg); height: 34px; padding: 0 15px 0 0; border-radius: 10px; position: relative; text-decoration: none; }
        .brand img { width: 65px; position: absolute; left: -10px; top: 50%; transform: translateY(-50%); }
        .brand h1 { font-size: 0.85rem; font-weight: 800; margin-left: 55px; color: var(--dark); }

        .header-contact { font-weight: 700; font-size: 0.75rem; color: var(--primary); text-decoration: none; border: 2px solid var(--primary); padding: 6px 15px; border-radius: 50px; }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 25px;
            max-width: 1250px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            align-items: stretch;
            min-height: 0;
        }

        /* --- LADO ESQUERDO --- */
        .viewer-section { 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            min-height: 0;
        }

        .viewer-title-container {
            display: flex;
            align-items: center;
            text-align: center;
            gap: 15px;
        }
        .viewer-title-container::before, .viewer-title-container::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #cbd5e1;
        }
        .viewer-title-container span {
            font-size: 0.75rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .iframe-wrapper {
            position: relative;
            flex: 1; 
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        #main-iframe { width: 100%; height: 100%; border: none; }

        .thumbs-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px;
            height: 110px;
            flex-shrink: 0;
        }
        
        .thumb-item { 
            border-radius: 15px; 
            cursor: pointer; 
            border: 2px solid #fff; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .thumb-item.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary), 0 8px 20px rgba(0,0,0,0.1);
            transform: translateY(-5px);
        }

        .thumb-item img { width: 85%; height: 85%; object-fit: contain; }

        /* --- LADO DIREITO (AJUSTE FINÍSSIMO) --- */
        .details-section {
            background: var(--white);
            padding: 40px; /* Aumentado para mais respiro */
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Distribui os itens com espaços iguais entre eles */
            min-height: 0;
            text-align: center; /* Centraliza o conteúdo por padrão */
        }

        .product-title { color: var(--dark); line-height: 1.1; margin-bottom: 5px; }
        .product-title .line1 { display: block; font-size: 1.9rem; font-weight: 800; letter-spacing: -1px; }
        .product-title .line2 { display: block; font-size: 1.2rem; font-weight: 600; color: #64748b; }

        .promo-box {
            background: #f0f7ff;
            border-left: 4px solid var(--primary);
            padding: 18px;
            border-radius: 12px;
            max-width: 90%;
            margin: 0 auto; /* Centraliza o box */
            text-align: left; /* Mantém o texto da promoção à esquerda para leitura */
        }
        .promo-box strong { color: var(--primary); font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .promo-box p { font-size: 0.85rem; color: #1e40af; font-weight: 600; line-height: 1.4; }

        .color-selector-container { margin: 10px 0; }
        .color-selector-label { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block; color: #94a3b8; }
        .color-options { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; } /* Centraliza as bolinhas */
        
        .color-dot { 
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid white; 
            box-shadow: 0 0 0 1px #e2e8f0; transition: 0.2s;
        }
        .color-dot:hover { transform: scale(1.2); box-shadow: 0 0 0 2px var(--primary); }

        .description { font-size: 0.9rem; line-height: 1.5; color: #64748b; max-width: 85%; margin: 0 auto; }
        
        .price-container { margin: 10px 0; }
        .price-tag { font-size: 3.8rem; color: var(--success); font-weight: 800; letter-spacing: -2px; display: block; }

        .buy-btn {
            background: var(--primary); color: white; height: 65px; border-radius: 20px; font-weight: 700;
            text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2); transition: 0.3s;
            width: 100%;
        }
        .buy-btn:hover { background: #1d4ed8; transform: translateY(-2px); }

        @media (max-width: 850px) {
            body { overflow: auto; height: auto; }
            .main-content { grid-template-columns: 1fr; }
            .iframe-wrapper { height: 350px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="brand">
            <img src="https://dirciano1.github.io/estamparia/imagens/logo.png" alt="Logo">
            <h1><span>Estamparia Gerais</span></h1>
        </a>
        <a href="https://wa.me/5500000000000" class="header-contact">Consultor</a>
    </header>

    <main class="main-content">
        <section class="viewer-section">
            <div class="viewer-title-container">
                <span>Amostra 3D</span>
            </div>
            
            <div class="iframe-wrapper">
                <iframe id="main-iframe" src="https://dirciano1.github.io/estamparia/app/caneca_pro.html#Jce3aS0|D30E15|ffebee"></iframe>
            </div>
            
            <div class="thumbs-grid">
                <div class="thumb-item active" onclick="changeModel(this, 'https://dirciano1.github.io/estamparia/app/caneca_pro.html#Jce3aS0|D30E15|ffebee')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png">
                </div>
                <div class="thumb-item" onclick="changeModel(this, 'https://dirciano1.github.io/estamparia/app/caneca_pro.html#OyXbJgI|151B4E|e3f2fd')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro2.png">
                </div>
                <div class="thumb-item" onclick="changeModel(this, 'https://dirciano1.github.io/estamparia/app/caneca_pro.html#ySivcZC|00625F|f1f8e9')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro3.png">
                </div>
                <div class="thumb-item" onclick="changeModel(this, 'https://dirciano1.github.io/estamparia/app/caneca_pro.html#FMSt1mZ|FF6600|fff3e0')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro4.png">
                </div>
            </div>
        </section>

        <section class="details-section">
            <div class="top-block">
                <h2 class="product-title">
                    <span class="line1">Caneca de Porcelana</span>
                    <span class="line2">Com Alça e Borda Colorida</span>
                </h2>
                
                <div class="promo-box">
                    <strong>Personalização Grátis</strong>
                    <p>Artes exclusivas com suas fotos e frases favoritas SEM CUSTO!</p>
                </div>
            </div>

            <div class="mid-block">
                <div class="color-selector-container">
                    <span class="color-selector-label">Escolha sua cor favorita:</span>
                    <div class="color-options">
                        <div class="color-dot" style="background: #8CC63F;" onclick="mudarCorIframe('8CC63F')"></div>
                        <div class="color-dot" style="background: #F4ACC4;" onclick="mudarCorIframe('F4ACC4')"></div>
                        <div class="color-dot" style="background: #1A1A1B;" onclick="mudarCorIframe('1A1A1B')"></div>
                        <div class="color-dot" style="background: #151B4E;" onclick="mudarCorIframe('151B4E')"></div>
                        <div class="color-dot" style="background: #FF6600;" onclick="mudarCorIframe('FF6600')"></div>
                        <div class="color-dot" style="background: #FFD700;" onclick="mudarCorIframe('FFD700')"></div>
                        <div class="color-dot" style="background: #D30E15;" onclick="mudarCorIframe('D30E15')"></div>
                        <div class="color-dot" style="background: #009CDE;" onclick="mudarCorIframe('009CDE')"></div>
                        <div class="color-dot" style="background: #00625F;" onclick="mudarCorIframe('00625F')"></div>
                    </div>
                </div>
                <p class="description">Cerâmica de alta resistência, acabamento em alto brilho e cores vivas.</p>
            </div>

            <div class="bottom-block">
                <div class="price-container">
                    <span class="price-tag">R$ 45,00</span>
                </div>
                <a href="https://wa.me/5500000000000" target="_blank" class="buy-btn">
                    <i class="fab fa-whatsapp"></i> Comprar Agora
                </a>
            </div>
        </section>
    </main>

    <script>
        const mapaFundos = {
            '8CC63F': 'f1f8e9',
            'F4ACC4': 'ffebee',
            '1A1A1B': 'f1f5f9',
            '151B4E': 'e3f2fd',
            'FF6600': 'fff3e0',
            'FFD700': 'fffde7',
            'D30E15': 'ffebee',
            '009CDE': 'e0f7fa',
            '00625F': 'e0f2f1'
        };

        function pintarThumbs() {
            const thumbs = document.querySelectorAll('.thumb-item');
            thumbs.forEach(thumb => {
                const onclickAttr = thumb.getAttribute('onclick');
                const match = onclickAttr.match(/\|([a-fA-F0-9]{3,6})'/);
                if (match && match[1]) {
                    thumb.style.backgroundColor = '#' + match[1];
                }
            });
        }

        function changeModel(el, url) {
            document.querySelectorAll('.thumb-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('main-iframe').src = url;
        }

        function mudarCorIframe(novaCor) {
            const iframe = document.getElementById('main-iframe');
            let urlAtual = iframe.src;
            if (urlAtual.includes('#')) {
                let partes = urlAtual.split('#');
                let params = partes[1].split('|');
                params[1] = novaCor; 
                params[2] = mapaFundos[novaCor] || 'ffffff'; 
                iframe.src = partes[0] + '#' + params.join('|');
            }
        }

        window.onload = pintarThumbs;
    </script>
</body>
</html>
