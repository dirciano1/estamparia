<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caneca Premium | Estamparia Gerais</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --success: #16a34a;
            --dark: #111111; 
            --bg: #f5f5f7; 
            --white: #ffffff;
            --search-bg: #e2e8f0; 
            --header-desktop: 70px; /* Reduzido */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Travando a rolagem no desktop para manter fixo na tela */
        body { 
            background: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #64748b; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }
        
        /* HEADER COM CONTATO */
        header { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(20px);
            padding: 0 4vw; 
            display: flex; justify-content: space-between; align-items: center; 
            height: var(--header-desktop);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .brand-container { display: flex; align-items: center; }
        .brand { 
            display: flex; align-items: center; 
            background: var(--search-bg); 
            height: 40px; 
            padding: 0 15px 0 0; 
            border-radius: 12px;
            position: relative;
            text-decoration: none;
        }
        .brand img { 
            width: 75px; height: auto;
            position: absolute;
            left: -12px; top: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }
        .brand h1 {
            font-size: 0.95rem; 
            font-weight: 800;
            margin-left: 55px; 
            color: var(--dark);
        }
        .brand h1 span {
            background: linear-gradient(90deg, #ff007a, #ff9500, #34c759, #007aff, #ff007a);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorsPassing 4s linear infinite;
        }

        @keyframes colorsPassing {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .header-contact {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--primary);
            text-decoration: none;
            border: 1.5px solid var(--primary);
            padding: 8px 18px;
            border-radius: 50px;
            transition: 0.3s;
        }
        .header-contact:hover { background: var(--primary); color: white; }

        /* ÁREA PRINCIPAL AJUSTADA */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 400px; /* Coluna da direita fixa e menor */
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            align-items: center; /* Centraliza verticalmente */
        }

        /* LADO ESQUERDO: VISUALIZAÇÃO COMPACTA */
        .viewer-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
            justify-content: center;
        }

        #main-iframe {
            width: 100%;
            height: 400px; /* Altura controlada */
            border: none;
            border-radius: 20px;
            background: var(--white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .thumbs-grid {
            display: grid;
            grid-template-columns: repeat(3, 80px); /* Miniaturas bem menores */
            gap: 12px;
            justify-content: center;
        }

        .thumb-item {
            width: 80px;
            height: 80px;
            background: var(--white);
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .thumb-item:hover { border-color: var(--primary); scale: 1.05; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

        /* LADO DIREITO: DESCRIÇÃO COMPACTA */
        .details-section {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .tag {
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .product-title {
            font-size: 1.4rem;
            color: var(--dark);
            font-weight: 800;
            margin-bottom: 8px;
        }

        .price-tag {
            font-size: 1.8rem;
            color: var(--success);
            font-weight: 800;
            margin-bottom: 15px;
            display: block;
        }

        .description {
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .buy-btn {
            display: block;
            width: 100%;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: 0.3s;
        }

        /* MOBILE ADAPTATION */
        @media (max-width: 968px) {
            body { overflow: auto; height: auto; }
            .main-content { grid-template-columns: 1fr; }
            #main-iframe { height: 350px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <a href="../index.html" class="brand">
                <img src="https://dirciano1.github.io/estamparia/imagens/logo.png" alt="Logo">
                <h1><span>Estamparia Gerais</span></h1>
            </a>
        </div>
        <a href="https://wa.me/SEUNUMERO" class="header-contact">Falar com Consultor</a>
    </header>

    <main class="main-content">
        <section class="viewer-section">
            <iframe id="main-iframe" src="https://dirciano1.github.io/estamparia/app/caneca_pro.html#|#DF1212"></iframe>
            
            <div class="thumbs-grid">
                <div class="thumb-item" onclick="changeModel('https://dirciano1.github.io/estamparia/app/caneca_pro.html#|#DF1212')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png">
                </div>
                <div class="thumb-item" onclick="changeModel('https://dirciano1.github.io/estamparia/app/caneca_pro.html#|#DF1212')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png">
                </div>
                <div class="thumb-item" onclick="changeModel('https://dirciano1.github.io/estamparia/app/caneca_pro.html#|#DF1212')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png">
                </div>
            </div>
        </section>

        <section class="details-section">
            <span class="tag">Coleção Premium</span>
            <h2 class="product-title">Caneca Alça & Borda</h2>
            
            <div class="description">
                Cerâmica AAA com brilho intenso. Perfeita para presentear ou para o seu café diário com estilo único.
                <br><br>
                <strong>Detalhes:</strong> 325ml, alta resistência ao calor e acabamento impecável.
            </div>

            <span class="price-tag">R$ 45,00</span>

            <a href="https://wa.me/SEUNUMERO" target="_blank" class="buy-btn">Encomendar via WhatsApp</a>
        </section>
    </main>

    <script>
        function changeModel(url) {
            document.getElementById('main-iframe').src = url;
        }
    </script>

</body>
</html>
