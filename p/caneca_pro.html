<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caneca Premium | Estamparia Gerais</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --success: #16a34a;
            --dark: #111111; 
            --bg: #f5f5f7; 
            --white: #ffffff;
            --search-bg: #e2e8f0; 
            --header-h: 60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        body { 
            background: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #64748b; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
        }
        
        header { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 0 4vw; 
            display: flex; justify-content: space-between; align-items: center; 
            height: var(--header-h);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand { display: flex; align-items: center; background: var(--search-bg); height: 34px; padding: 0 15px 0 0; border-radius: 10px; position: relative; text-decoration: none; }
        .brand img { width: 65px; position: absolute; left: -10px; top: 50%; transform: translateY(-50%); }
        .brand h1 { font-size: 0.85rem; font-weight: 800; margin-left: 55px; color: var(--dark); }

        .header-contact { font-weight: 700; font-size: 0.75rem; color: var(--primary); text-decoration: none; border: 2px solid var(--primary); padding: 6px 15px; border-radius: 50px; }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 25px;
            max-width: 1250px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            align-items: stretch;
        }

        /* --- LADO ESQUERDO --- */
        .viewer-section { 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            height: 80vh; /* Altura controlada no desktop */
        }

        .viewer-title-container {
            display: flex; align-items: center; text-align: center; gap: 15px; flex-shrink: 0;
        }
        .viewer-title-container::before, .viewer-title-container::after {
            content: ""; flex: 1; height: 1px; background: #cbd5e1;
        }
        .viewer-title-container span {
            font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;
        }

        .iframe-wrapper {
            position: relative;
            flex: 1; 
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            min-height: 0;
        }

        #main-iframe { width: 100%; height: 100%; border: none; }

        .floating-scroll-btn {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(37, 99, 235, 0.9);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            display: none; 
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(4px);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-5px);}
        }

        .thumbs-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px;
            height: 85px; /* Altura reduzida para não cortar */
            flex-shrink: 0;
        }
        
        .thumb-item { 
            border-radius: 12px; cursor: pointer; background: white; 
            border: 2px solid #fff; transition: 0.3s; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .thumb-item.active { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary); }
        .thumb-item img { width: 80%; height: 80%; object-fit: contain; }

        /* --- LADO DIREITO --- */
        .details-section {
            background: var(--white);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            text-align: center;
        }

        .product-title .line1 { display: block; font-size: 1.7rem; font-weight: 800; letter-spacing: -1px; color: var(--dark); }
        .product-title .line2 { display: block; font-size: 1rem; font-weight: 600; color: #64748b; }

        .promo-box {
            background: #f0f7ff; 
            padding: 15px; border-radius: 12px; max-width: 95%; margin: 10px auto; text-align: center;
            margin-top:2em;
        }
        .promo-box strong { color: var(--primary); font-size: 0.7rem; text-transform: uppercase; display: block; }
        .promo-box p { font-size: 0.8rem; color: #1e40af; font-weight: 600; }

        .color-selector-label { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; color: #94a3b8; }
        .color-options { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 1px #e2e8f0; }

        .price-tag { font-size: 3.2rem; color: var(--success); font-weight: 800; display: block; margin-bottom:1.5em; }

        .buy-btn {
            background: var(--primary); color: white; height: 55px; border-radius: 18px; font-weight: 700;
            text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
        }

         /* --- EFEITO PREMIUM NO BOTÃO DE COMPRA --- */
.buy-btn {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 2px solid var(--primary); /* Cria a borda que aparecerá no hover */
    position: relative;
    overflow: hidden;
}

.buy-btn:hover {
    background: var(--white) !important; /* Inverte o fundo para branco */
    color: var(--primary) !important;    /* Inverte o texto/ícone para azul */
    transform: translateY(-5px);         /* Efeito de elevação (Lift) */
    box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3); /* Sombra mais profunda */
}

/* Garante que o ícone do WhatsApp também mude de cor no hover */
.buy-btn:hover i {
    color: var(--primary) !important;
}

/* Efeito de clique (feedback tátil) */
.buy-btn:active {
    transform: translateY(-2px);
    box-shadow: 0 5px 10px rgba(37, 99, 235, 0.2);
}
        /* --- AJUSTES MOBILE --- */
        @media (max-width: 850px) {
            body { overflow-y: auto; overflow-x: hidden; }
            .main-content { grid-template-columns: 1fr; padding: 10px; gap: 20px; }
            
            .viewer-section { 
                height: 80vh; 
                gap: 10px; 
            }
            .floating-scroll-btn { display: flex; }
            .thumbs-grid { height: 90px; }

            .details-section { 
                height: auto; /* Remove o vh fixo para tirar o branco sobrando */
                min-height: 60vh; 
                padding: 30px 15px; 
                gap: 25px;
                margin-bottom: 30px;
            }
            
            .product-title .line1 { font-size: 1.4rem; white-space: nowrap; }
            .color-options { flex-wrap: nowrap; overflow-x: auto; justify-content: space-between; gap: 5px; }
            .color-dot { width: 22px; height: 22px; flex-shrink: 0; }
        }

        @media (min-width: 851px) {
            body { overflow: hidden; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="brand">
            <img src="https://dirciano1.github.io/estamparia/imagens/logo.png" alt="Logo">
            <h1><span>Estamparia Gerais</span></h1>
        </a>
        <a href="https://wa.me/5500000000000" class="header-contact">Consultor</a>
    </header>

    <main class="main-content">
        <section class="viewer-section">
            <div class="viewer-title-container">
                <span>Amostra 3D</span>
            </div>
            
            <div class="iframe-wrapper">
                <iframe id="main-iframe" src="https://dirciano1.github.io/estamparia/app/caneca_pro.html#Jce3aS0|D30E15|ffebee"></iframe>
                <button class="floating-scroll-btn" onclick="document.getElementById('venda').scrollIntoView();">
                    Ver preço <i class="fas fa-chevron-down"></i>
                </button>
            </div>
            
            <div class="thumbs-grid">
                <div class="thumb-item active" onclick="changeModel(this, 'https://dirciano1.github.io/estamparia/app/caneca_pro.html#Jce3aS0|D30E15|ffebee')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro.png">
                </div>
                <div class="thumb-item" onclick="changeModel(this, 'https://dirciano1.github.io/estamparia/app/caneca_pro.html#OyXbJgI|151B4E|e3f2fd')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro2.png">
                </div>
                <div class="thumb-item" onclick="changeModel(this, 'https://dirciano1.github.io/estamparia/app/caneca_pro.html#ySivcZC|00625F|f1f8e9')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro3.png">
                </div>
                <div class="thumb-item" onclick="changeModel(this, 'https://dirciano1.github.io/estamparia/app/caneca_pro.html#FMSt1mZ|FF6600|fff3e0')">
                    <img src="https://dirciano1.github.io/estamparia/imagens/caneca_pro4.png">
                </div>
            </div>
        </section>

        <section class="details-section" id="venda">
            <div class="top-block">
                <h2 class="product-title">
                    <span class="line1">Caneca de Porcelana</span>
                    <span class="line2">Com Alça e Borda Colorida</span>
                </h2>
                <div class="promo-box">
                    <strong>Personalização Grátis</strong>
                    <p>Artes exclusivas sem custo adicional!</p>
                </div>
            </div>

            <div class="mid-block">
                <div class="color-selector-container">
                    <span class="color-selector-label">Escolha sua cor favorita:</span>
                    <div class="color-options">
                        <div class="color-dot" style="background: #8CC63F;" onclick="mudarCorIframe('8CC63F')"></div>
                        <div class="color-dot" style="background: #F4ACC4;" onclick="mudarCorIframe('F4ACC4')"></div>
                        <div class="color-dot" style="background: #1A1A1B;" onclick="mudarCorIframe('1A1A1B')"></div>
                        <div class="color-dot" style="background: #151B4E;" onclick="mudarCorIframe('151B4E')"></div>
                        <div class="color-dot" style="background: #FF6600;" onclick="mudarCorIframe('FF6600')"></div>
                        <div class="color-dot" style="background: #FFD700;" onclick="mudarCorIframe('FFD700')"></div>
                        <div class="color-dot" style="background: #D30E15;" onclick="mudarCorIframe('D30E15')"></div>
                        <div class="color-dot" style="background: #009CDE;" onclick="mudarCorIframe('009CDE')"></div>
                        <div class="color-dot" style="background: #00625F;" onclick="mudarCorIframe('00625F')"></div>
                    </div>
                </div>
            </div>

            <div class="bottom-block">
                <div class="price-container">
                    <span class="price-tag">R$ 45,00</span>
                </div>
                <a href="https://wa.me/5500000000000" target="_blank" class="buy-btn">
                    <i class="fab fa-whatsapp"></i> Comprar Agora
                </a>
            </div>
        </section>
    </main>

    <script>
        const mapaFundos = {
            '8CC63F': 'f1f8e9', 'F4ACC4': 'ffebee', '1A1A1B': 'f1f5f9',
            '151B4E': 'e3f2fd', 'FF6600': 'fff3e0', 'FFD700': 'fffde7',
            'D30E15': 'ffebee', '009CDE': 'e0f7fa', '00625F': 'e0f2f1'
        };

        function pintarThumbs() {
            document.querySelectorAll('.thumb-item').forEach(thumb => {
                const match = thumb.getAttribute('onclick').match(/\|([a-fA-F0-9]{3,6})'/);
                if (match) thumb.style.backgroundColor = '#' + match[1];
            });
        }

        function changeModel(el, url) {
            document.querySelectorAll('.thumb-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('main-iframe').src = url;
        }

        function mudarCorIframe(novaCor) {
            const iframe = document.getElementById('main-iframe');
            let urlAtual = iframe.src;
            if (urlAtual.includes('#')) {
                let partes = urlAtual.split('#');
                let params = partes[1].split('|');
                params[1] = novaCor; 
                params[2] = mapaFundos[novaCor] || 'ffffff'; 
                iframe.src = partes[0] + '#' + params.join('|');
            }
        }

        window.onload = pintarThumbs;
    </script>
</body>
</html>
