<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Pro - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }

        /* Painel de Cores Flutuante */
        .color-selector {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); padding: 15px 25px;
            border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; align-items: center; gap: 15px; z-index: 1000;
            border: 1px solid #eee;
        }
        .color-selector span { font-size: 14px; font-weight: bold; color: #444; margin-right: 5px; }
        
        .btn-color {
            width: 35px; height: 35px; border-radius: 50%; border: 3px solid white;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s, border-color 0.2s;
        }
        .btn-color:hover { transform: scale(1.2); }
        .btn-color.active { border-color: #2563eb; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="color-selector" id="menu-cores">
        <span>Cores da Alça e Borda:</span>
        </div>

    <div id="canvas-container"></div>

    <script>
        // --- CONFIGURAÇÃO DE CORES (ADICIONE NOVAS AQUI) ---
        const CORES_DISPONIVEIS = [
            { nome: 'Branco', hex: '#ffffff' },
            { nome: 'Vermelho', hex: '#DF1212' },
            { nome: 'Azul', hex: '#1D85D0' },
            { nome: 'Rosa Claro', hex: '#FFC2C2' },
            { nome: 'Verde', hex: '#075103' },
            { nome: 'Amarelo', hex: '#EDD900' },
            { nome: 'Laranja', hex: '#F86900' }
        ];

        // Mapeamento das peças do seu caneca.gltf
        const ID_ALCA = "Cylinder001_5";
        const ID_BORDA = "Cylinder001_1";
        const ID_CORPO = "Cylinder001_2"; // Onde fica a arte

        let scene, camera, renderer, controls, loaderGLTF;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            // Carregar Arte
            const texLoader = new THREE.TextureLoader();
            const urlParams = new URLSearchParams(window.location.search);
            const estampa = texLoader.load(urlParams.get('foto') || 'canecas/01.jpg');
            estampa.flipY = false;
            estampa.encoding = THREE.sRGBEncoding;

            // Carregar Modelo
            loaderGLTF = new THREE.GLTFLoader();
            loaderGLTF.load('caneca.gltf', (gltf) => {
                const model = gltf.scene;

                model.traverse((node) => {
                    if (node.isMesh) {
                        const mat = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.05,
                            clearcoat: 1.0,
                            side: THREE.DoubleSide
                        });

                        // Aplica estampa apenas no corpo
                        if (node.name === ID_CORPO) mat.map = estampa;
                        
                        node.material = mat;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                model.position.sub(box.getCenter(new THREE.Vector3()));
                model.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                scene.add(model);
                
                gerarBotoesCores();
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            window.addEventListener('resize', onWindowResize);
        }

        // Função para criar o menu de cores dinamicamente
        function gerarBotoesCores() {
            const menu = document.getElementById('menu-cores');
            CORES_DISPONIVEIS.forEach((cor, index) => {
                const btn = document.createElement('div');
                btn.className = 'btn-color';
                if(index === 0) btn.classList.add('active');
                btn.style.backgroundColor = cor.hex;
                btn.title = cor.nome;
                
                btn.onclick = function() {
                    // Remover classe ativa de todos
                    document.querySelectorAll('.btn-color').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Aplicar cor na ALÇA e na BORDA simultaneamente
                    mudarCorParte(ID_ALCA, cor.hex);
                    mudarCorParte(ID_BORDA, cor.hex);
                };
                
                menu.appendChild(btn);
            });
        }

        function mudarCorParte(id, hex) {
            scene.traverse(node => {
                if (node.isMesh && node.name === id) {
                    node.material.color.set(hex);
                    node.material.needsUpdate = true;
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
