<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Caneca Imgur</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader;

        const PECAS_COLORIDAS = ["Cylinder001_5", "Cylinder001_3"]; // Alça e Fundo

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 1.2, 4.5); // Posição de câmera padronizada

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0; 
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');

            // --- GRID (CHÃO) PADRONIZADO ---
            const gridTexture = texLoader.load('grid.png'); 
            gridTexture.wrapS = gridTexture.wrapT = THREE.RepeatWrapping;
            gridTexture.repeat.set(10, 10);
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(5, 5),
                new THREE.MeshBasicMaterial({ 
                    map: gridTexture, 
                    transparent: true, 
                    opacity: 0.15, // Mesma opacidade da outra
                    depthWrite: false 
                })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.96; // Alinhado com a base
            scene.add(ground);

            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] || "#ffffff";

            let estampa = null;
            if (idImgur && idImgur.trim() !== "") {
                const urlImgur = `https://i.imgur.com/${idImgur}.jpeg`;
                estampa = texLoader.load(urlImgur);
                estampa.flipY = false;
                estampa.encoding = THREE.sRGBEncoding;
            }

            const corObjeto = new THREE.Color(corHexLink).convertSRGBToLinear();

            loaderGLTF.load('caneca.gltf', (gltf) => {
                const model = gltf.scene;

                model.traverse((node) => {
                    if (node.isMesh) {
                        const mat = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.05,
                            clearcoat: 1.0,
                            clearcoatRoughness: 0.02,
                            side: THREE.DoubleSide
                        });

                        if (PECAS_COLORIDAS.includes(node.name)) {
                            mat.color.copy(corObjeto);
                        }

                        if (node.name === "Cylinder001_2" && estampa) {
                            mat.map = estampa;
                        }

                        node.material = mat;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                model.position.sub(box.getCenter(new THREE.Vector3()));
                model.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                scene.add(model);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.5;

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('hashchange', () => window.location.reload());
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
