<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Caneca Branca Dinâmica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, loaderGLTF, texLoader;

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. Configuração da Cena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 4);

            // 2. Renderizador
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0; // Ajustado para 1.0 para fidelidade de cor
            container.appendChild(renderer.domElement);

            // 3. Iluminação
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            // 4. Carregamento de Ativos Dinâmico
            loaderGLTF = new THREE.GLTFLoader();
            texLoader = new THREE.TextureLoader();

            // --- LÓGICA DO LINK (#foto.jpg) ---
            // Pega o nome após o #. Ex: caneca.html#arte.jpg -> nomeArquivo vira 'arte.jpg'
            let nomeArquivo = window.location.hash.substring(1) || '01.jpg';
            let caminhoCompleto = 'canecas/' + nomeArquivo;

            const estampa = texLoader.load(caminhoCompleto, 
                // Sucesso
                () => { console.log("Carregado: " + caminhoCompleto); },
                // Progresso
                undefined, 
                // Erro: Se a foto do link não existir, tenta carregar a 01.jpg
                () => { 
                    console.warn("Foto não encontrada, carregando padrão 01.jpg");
                    window.location.hash = "01.jpg"; 
                }
            );

            estampa.flipY = false;
            estampa.encoding = THREE.sRGBEncoding;

            // 5. Carregar o Modelo
            loaderGLTF.load('caneca.gltf', (gltf) => {
                const model = gltf.scene;

                model.traverse((node) => {
                    if (node.isMesh) {
                        const mat = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.05,
                            clearcoat: 1.0,
                            clearcoatRoughness: 0.02,
                            side: THREE.DoubleSide
                        });

                        // Aplica a estampa apenas no corpo da caneca
                        if (node.name === "Cylinder001_2") {
                            mat.map = estampa;
                        } else {
                            mat.map = null;
                        }

                        node.material = mat;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                model.position.sub(box.getCenter(new THREE.Vector3()));
                const size = box.getSize(new THREE.Vector3()).length();
                model.scale.setScalar(3.5 / size);
                
                scene.add(model);
            });

            // 6. Controles
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.5;

            window.addEventListener('resize', onWindowResize);

            // Se o usuário mudar o # no link sem atualizar a página, ela recarrega sozinha
            window.addEventListener('hashchange', () => {
                window.location.reload();
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
