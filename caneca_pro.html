<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, model3D, currentEstampa = null;

        // Configuração das peças: Alça (5) e Fundo/Borda (3)
        const PECAS_COLORIDAS = ["Cylinder001_5", "Cylinder001_3"];
        const MESH_CORPO = "Cylinder001_2"; 

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x999999);

            // --- AJUSTE DE ZOOM INICIAL (50%) ---
            // Câmera mais afastada (Z=8.0) para enquadramento melhor
            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3.5, 2.5, 8.0); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // --- AJUSTE DE FIDELIDADE DE COR ---
            // Removido ToneMapping para a cor azul/escura ficar idêntica ao painel
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.NoToneMapping; 
            container.appendChild(renderer.domElement);

            // Iluminação neutra para não lavar as cores
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0xffffff, 0.3);
            light.position.set(5, 10, 7);
            scene.add(light);

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');

            // --- LÓGICA DO LINK ---
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] ? (partes[1].startsWith('#') ? partes[1] : "#" + partes[1]) : "#ffffff"; 

            if (idImgur && idImgur.trim() !== "") {
                const urlImgur = `https://i.imgur.com/${idImgur}.jpeg`;
                currentEstampa = texLoader.load(urlImgur);
                currentEstampa.flipY = false;
                currentEstampa.encoding = THREE.sRGBEncoding;
            }

            const corObjeto = new THREE.Color(corHexLink);

            const loader = new THREE.GLTFLoader();
            
            loader.load('objetos/caneca_porcelanato/caneca.gltf', (gltf) => {
                model3D = gltf.scene;

                model3D.traverse((node) => {
                    if (node.isMesh) {
                        // Usando MeshStandard para cores mais sólidas e reais
                        const mat = new THREE.MeshStandardMaterial({
                            color: 0xffffff,
                            metalness: 0.1,
                            roughness: 0.4, 
                            side: THREE.DoubleSide
                        });

                        // Aplica cor nas peças (Alça e Fundo/Borda)
                        if (PECAS_COLORIDAS.includes(node.name)) {
                            mat.color.copy(corObjeto);
                        }

                        // Aplica estampa no corpo
                        if (node.name === MESH_CORPO && currentEstampa) {
                            mat.map = currentEstampa;
                        }

                        node.material = mat;
                    }
                });

                // Centralização e Escala
                const box = new THREE.Box3().setFromObject(model3D);
                const center = box.getCenter(new THREE.Vector3());
                model3D.position.sub(center);
                model3D.position.y = -0.5; // Ajuste para não flutuar
                
                scene.add(model3D);
            });

            // --- CONTROLES E LIMITES ---
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;
            controls.minDistance = 4;   // Zoom máximo permitido
            controls.maxDistance = 15;  // Zoom mínimo permitido

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('hashchange', () => window.location.reload());
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
