<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Estamparia Gerais</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls, model3D, currentEstampa = null;

        // Configuração das peças conforme o modelo de porcelanato
        const PECAS_COLORIDAS = ["Cylinder001_5", "Cylinder001_3", "Cylinder001_4"];
        const MESH_CORPO = "Cylinder001_2"; 

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            // Câmera padronizada para o ângulo de estúdio
            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 1.2, 4.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // Configurações de cores e brilho ACES (Igual às outras versões)
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0; 
            container.appendChild(renderer.domElement);

            // Iluminação para realçar a porcelana branca
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            const texLoader = new THREE.TextureLoader();
            texLoader.setCrossOrigin('anonymous');

            // --- LÓGICA DO LINK (#ID_IMGUR|#COR) ---
            const hash = window.location.hash.substring(1);
            const partes = hash.split('|');
            const idImgur = partes[0] || "";
            const corHexLink = partes[1] || "#ffffff"; 

            if (idImgur && idImgur.trim() !== "") {
                const urlImgur = `https://i.imgur.com/${idImgur}.jpeg`;
                currentEstampa = texLoader.load(urlImgur);
                currentEstampa.flipY = false;
                currentEstampa.encoding = THREE.sRGBEncoding;
            }

            const corObjeto = new THREE.Color(corHexLink).convertSRGBToLinear();

            const loader = new THREE.GLTFLoader();
            
            // --- CARREGANDO DO NOVO DIRETÓRIO ---
            loader.load('objetos/caneca_porcelanato/caneca.gltf', (gltf) => {
                model3D = gltf.scene;

                model3D.traverse((node) => {
                    if (node.isMesh) {
                        const mat = new THREE.MeshPhysicalMaterial({
                            color: 0xffffff,
                            metalness: 0,
                            roughness: 0.05,
                            clearcoat: 1.0,
                            clearcoatRoughness: 0.02,
                            side: THREE.DoubleSide
                        });

                        // Aplica cor do link nas partes coloridas (Alça, Interior, Fundo)
                        if (PECAS_COLORIDAS.includes(node.name)) {
                            mat.color.copy(corObjeto);
                        }

                        // Aplica estampa do link no corpo (Parte 2)
                        if (node.name === MESH_CORPO && currentEstampa) {
                            mat.map = currentEstampa;
                        }

                        node.material = mat;
                    }
                });

                // Centralização e escala padronizada
                const box = new THREE.Box3().setFromObject(model3D);
                model3D.position.sub(box.getCenter(new THREE.Vector3()));
                model3D.scale.setScalar(3.5 / box.getSize(new THREE.Vector3()).length());
                scene.add(model3D);
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.5;

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('hashchange', () => window.location.reload());
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
